  ═══ AUDITORÍA DE BUGS Y UX POLISH — 2 abril 2026 ═══

  1. WENT_WITH BUG (CRÍTICO): Se eliminó la concatenación de "Fui con" al campo notes
     que causaba duplicación cada vez que se editaba. Ahora went_with se guarda como
     campo JSON separado en Supabase.

  2. MANEJO DE ERRORES SUPABASE: Todos los CRUD (handleSave, handleDelete, handleAddDish,
     handleDeleteDish) ahora capturan errores y muestran toast rojo al usuario.
     loadSocialData, acceptRequest, rejectRequest, loadFeed — todos con error handling.
     Toast component soporta type="error" con estilo visual diferenciado (rojo, 3.5s).

  3. RACE CONDITIONS / MEMORY LEAKS: Cleanup con cancelled flag en:
     - FeedScreen.loadFeed + comments useEffect
     - AddEditModal friends useEffect
     - ProfileScreen match scores useEffect
     - FriendProfileModal ya tenía cleanup (verificado)
     - GooglePlaceModal y PlacePhotoImg ya tenían cleanup (verificado)

  4. ESCAPE KEY: Todos los modales ahora se cierran con Escape:
     AddDishModal, AddEditModal, CreateListModal, ListActionModal,
     FriendSearchModal, FriendProfileModal, GooglePlaceModal.

  5. VALIDACIÓN DE FORMULARIOS:
     - Onboarding: username validado (alfanumérico + underscore, mín 3 chars)
       con mensajes inline en español.
     - AddEditModal: botón Guardar/Registrar muestra "Guardando…" y se deshabilita
       durante el save (previene doble-click).

  6. ESTADOS VACÍOS:
     - ProfileScreen: lista de amigos vacía muestra CTA "Buscar amigos" con emoji
       e instrucción clara (antes no mostraba nada).
     - FeedScreen: sin amigos, sin posts — ya tenían estados vacíos (verificado).
     - BitacoraScreen: sin restaurantes — ya tenía estado vacío (verificado).

  7. ERROR FEEDBACK EN SOCIAL:
     - FriendSearchModal.addFriend: muestra error inline si falla la solicitud.
     - loadSocialData: maneja errores de friendships y profiles gracefully.
     - acceptRequest/rejectRequest: solo recargan si la operación fue exitosa.

  8. COMMENTS SECTION:
     - CommentsSection useEffect: cleanup con cancelled flag + error handling.
     - deleteComment: ahora verifica error antes de remover del estado.

  9. FRIENDPROFILEMODAL: Agregado cancelled flag para prevenir state updates
     después de unmount (memory leak fix).

  10. MAPA ESTADO VACÍO: MapScreen ahora muestra overlay cuando no hay pines
      en la zona visible, guiando al usuario a buscar restaurantes.

  function resizeImage(file,maxPx=1000,q=0.78){

      r.readAsDataURL(file);
    });
  }

  // ── ELO helpers ────────────────────────────────────────────────────────────
  function calcElo(winnerScore,loserScore){
    const K=0.5,pWin=1/(1+Math.pow(10,(loserScore-winnerScore)/4)),delta=K*(1-pWin);
    return{winner:+Math.min(9.9,Math.max(0.1,winnerScore+delta)).toFixed(1),loser:+Math.min(9.9,Math.max(0.1,loserScore-delta)).toFixed(1)};}

  // ── Match Score ─────────────────────────────────────────────────────────────
  function calcMatchScore(myRestaurants, friendRestaurants){
    const friendMap={};
    friendRestaurants.forEach(r=>{
      if(r.place_id)friendMap["pid:"+r.place_id]=r;
      if(r.name&&r.neighborhood)friendMap["nn:"+(r.name||"").toLowerCase().trim()+"||"+(r.neighborhood||"").toLowerCase().trim()]=r;
    });
    const common=[];
    myRestaurants.forEach(r=>{
      let match=null;
      if(r.place_id&&friendMap["pid:"+r.place_id])match=friendMap["pid:"+r.place_id];
      else{
        const key="nn:"+(r.name||"").toLowerCase().trim()+"||"+(r.neighborhood||"").toLowerCase().trim();
        if(friendMap[key])match=friendMap[key];
      }
      if(match&&r.rating>0&&match.rating>0)common.push({mine:r,theirs:match,diff:Math.abs(r.rating-match.rating)});
    });
    if(common.length===0)return{score:null,common,confidence:"none"};
    const avgDiff=common.reduce((s,c)=>s+c.diff,0)/common.length;
    const score=Math.max(0,Math.min(100,Math.round(100-avgDiff*20)));
    const confidence=common.length>=3?"high":common.length>=1?"low":"none";
    return{score,common:common.sort((a,b)=>b.diff-a.diff),confidence};
  }

    useEffect(()=>{
      if(!restaurantId)return;
      let cancelled=false;
      (async()=>{
        setLoading(true);
        const{data,error}=await sb.from("comments")
          .select("id,content,created_at,user_id,profiles(id,username,name,avatar_url)")
          .eq("restaurant_id",restaurantId)
          .order("created_at",{ascending:false});
        if(cancelled)return;
        if(!error)setComments(data||[]);
        setLoading(false);
      })();
      return()=>{cancelled=true;};
    },[restaurantId]);
    const sendComment=async()=>{
      if(!text.trim()||!currentUser||sending)return;
      setSending(true);
      const content=text.trim();
      const optimistic={id:"temp-"+Date.now(),content,created_at:new Date().toISOString(),user_id:currentUser.id,profiles:{id:currentUser.id,username:"tú",name:"Tú",avatar_url:null}};
      setComments(prev=>[optimistic,...prev]);
      setText("");
      const{data,error}=await sb.from("comments").insert({restaurant_id:restaurantId,user_id:currentUser.id,content}).select("id,content,created_at,user_id,profiles(id,username,name,avatar_url)").single();
      if(!error&&data)setComments(prev=>prev.map(c=>c.id===optimistic.id?data:c));
      else if(error)setComments(prev=>prev.filter(c=>c.id!==optimistic.id));
      setSending(false);
    };
    const deleteComment=async(cid)=>{
      const{error}=await sb.from("comments").delete().eq("id",cid);
      if(!error)setComments(prev=>prev.filter(c=>c.id!==cid));
    };
    const shown=(showAll||!previewMode)?comments:comments.slice(0,2);
    const hasMore=previewMode&&!showAll&&comments.length>2;
    if(loading)return<p style={{fontSize:11,color:"#555",padding:"8px 0",margin:0}}>Cargando comentarios…</p>;
    return(
      <div>
        {comments.length===0&&<p style={{fontSize:12,color:"#444",padding:"4px 0",margin:0}}>{currentUser?"Sé el primero en comentar":"Sin comentarios aún"}</p>}
        {shown.map(c=>{
          const prof=c.profiles||{};
          const canDelete=currentUser&&(c.user_id===currentUser.id||isOwner);
          return(
            <div key={c.id} style={{display:"flex",gap:8,padding:"7px 0",borderBottom:"1px solid #1a1a1a"}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,#f97316,#fbbf24)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,flexShrink:0,overflow:"hidden"}}>
                {prof.avatar_url?<img src={prof.avatar_url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:"👤"}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:11,fontWeight:700,color:"#ccc"}}>@{prof.username||"usuario"}</span>
                  <span style={{fontSize:9,color:"#444"}}>{timeAgoComment(c.created_at)}</span>
                  {canDelete&&<button onClick={()=>deleteComment(c.id)} style={{marginLeft:"auto",background:"none",border:"none",color:"#444",fontSize:10,cursor:"pointer",padding:"0 2px",lineHeight:1}} onMouseEnter={e=>e.currentTarget.style.color="#ef4444"} onMouseLeave={e=>e.currentTarget.style.color="#444"}>✕</button>}
                </div>
                <p style={{margin:"2px 0 0",fontSize:12,color:"#999",lineHeight:1.4,wordBreak:"break-word"}}>{c.content}</p>
              </div>
            </div>
          );
        })}
        {hasMore&&<button onClick={()=>setShowAll(true)} style={{background:"none",border:"none",color:"#f97316",fontSize:11,cursor:"pointer",padding:"6px 0",fontWeight:600}}>Ver todos ({comments.length})</button>}
        {currentUser&&(
          <div style={{display:"flex",gap:8,marginTop:8,alignItems:"flex-end"}}>
            <textarea value={text} onChange={e=>setText(e.target.value.slice(0,280))} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendComment();}}} placeholder="Escribe un comentario…" rows={1} style={{flex:1,background:"#111",border:"1px solid #2a2a2a",borderRadius:10,padding:"8px 10px",color:"#fff",fontSize:12,outline:"none",resize:"none",lineHeight:1.4,minHeight:32,maxHeight:80,fontFamily:"inherit"}}/>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,flexShrink:0}}>
              <span style={{fontSize:9,color:text.length>260?"#ef4444":"#333"}}>{280-text.length}</span>
              <button onClick={sendComment} disabled={!text.trim()||sending} style={{width:30,height:30,borderRadius:"50%",background:text.trim()?"#f97316":"#2a2a2a",border:"none",color:"#fff",fontSize:13,cursor:text.trim()?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.15s",lineHeight:1}}>↑</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── Add Dish Modal ─────────────────────────────────────────────────────────
  function AddDishModal({onSave,onClose}){
    const[name,setName]=useState("");
    const[rating,setRating]=useState("bueno");
    const[notes,setNotes]=useState("");
    const[err,setErr]=useState("");
    useEffect(()=>{const h=e=>{if(e.key==="Escape")onClose();};document.addEventListener("keydown",h);return()=>document.removeEventListener("keydown",h);},[]);
    const inp={width:"100%",background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:"10px",padding:"10px 12px",color:"#fff",fontSize:"14px",outline:"none",boxSizing:"border-box"};
    const lbl={display:"block",fontSize:"10px",fontWeight:700,color:"#555",letterSpacing:"0.08em",marginBottom:"6px"};
    const save=()=>{if(!name.trim()){setErr("Escribe el nombre del plato.");return;}onSave({id:Date.now(),name:name.trim(),rating,notes:notes.trim(),createdAt:new Date().toISOString()});};
    const RATINGS=[{id:"bueno",icon:"👍",label:"Bueno"},{id:"destacado",icon:"⭐",label:"Destacado"},{id:"imperdible",icon:"🏆",label:"Imperdible"}];
    return(
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",flexDirection:"column",justifyContent:"flex-end",zIndex:9999,backdropFilter:"blur(6px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div className="slide-up" style={{background:"#111",borderRadius:"24px 24px 0 0",border:"1px solid #222",borderBottom:"none"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 20px 0"}}>
            <button onClick={onClose} style={{background:"none",border:"none",color:"#777",fontSize:"15px",cursor:"pointer"}}>Cancelar</button>
            <h2 style={{margin:0,fontSize:"16px",fontWeight:700,color:"#fff"}}>Nuevo Plato</h2>
            <button onClick={save} style={{background:"#f97316",border:"none",color:"#fff",fontSize:"15px",fontWeight:700,cursor:"pointer",borderRadius:"8px",padding:"6px 16px"}}>Guardar</button>
          </div>
          <div style={{display:"flex",justifyContent:"center",padding:"10px 0 0"}}><div style={{width:36,height:4,borderRadius:2,background:"#2a2a2a"}}/></div>
          <div style={{padding:"16px 20px 44px",display:"flex",flexDirection:"column",gap:14}}>
            {err&&<div style={{background:"#ef444422",border:"1px solid #ef4444",borderRadius:"8px",padding:"10px 14px",fontSize:"13px",color:"#ef4444"}}>{err}</div>}
            <div><label style={lbl}>NOMBRE DEL PLATO *</label><input value={name} onChange={e=>{setName(e.target.value);setErr("");}} placeholder="Ej: Ceviche clásico, Lomo saltado…" style={inp} autoFocus/></div>
            <div>
              <label style={lbl}>VALORACIÓN</label>
              <div style={{display:"flex",gap:8}}>
                {RATINGS.map(opt=>(
                  <button key={opt.id} onClick={()=>setRating(opt.id)} style={{flex:1,padding:"10px 6px",borderRadius:10,background:rating===opt.id?"#f9731622":"#1a1a1a",border:`1.5px solid ${rating===opt.id?"#f97316":"#2a2a2a"}`,color:rating===opt.id?"#fff":"#666",fontSize:12,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"all 0.15s"}}>
                    <span style={{fontSize:20}}>{opt.icon}</span>
                    <span style={{fontWeight:rating===opt.id?700:400}}>{opt.label}</span>
                  </button>
                ))}
              </div>
            </div>
            <div><label style={lbl}>NOTAS <span style={{color:"#333",fontWeight:400,letterSpacing:0}}>(máx. 100 caracteres)</span></label><input value={notes} onChange={e=>setNotes(e.target.value.slice(0,100))} placeholder="¿Qué lo hace especial?" style={inp}/><p style={{margin:"4px 0 0",fontSize:"10px",color:"#444",textAlign:"right"}}>{notes.length}/100</p></div>
          </div>
        </div>
      </div>
    );
  }

  // ── Detail Screen ──────────────────────────────────────────────────────────
  function DetailScreen({restaurant:r,onBack,onEdit,onAddDish,onDeleteDish,profile,user}){
    const[showAddDish,setShowAddDish]=useState(false);
    const[expandNotes,setExpandNotes]=useState(false);
    const[deletingDishId,setDeletingDishId]=useState(null);
    const dishTimerRef=useRef(null);
    const cc=CUISINE_COLORS[r.cuisine]||"#f97316";
    const dishes=r.dishes||[];
    const DISH_RATING_ICONS={bueno:"👍",destacado:"⭐",imperdible:"🏆"};

    return(
      <div className="slide-in" style={{height:"100%",display:"flex",flexDirection:"column",background:"#0f0f0f"}}>
        {/* Hero area */}
        <div style={{position:"relative",flexShrink:0}}>
          {r.photo?(
            <div style={{height:"220px",overflow:"hidden"}}>
              <img src={r.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,rgba(0,0,0,0.35) 0%,transparent 40%,#0f0f0f 100%)"}}/>
            </div>
          ):(
            <div style={{height:"160px",background:`linear-gradient(135deg,${cc}18,${cc}08)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"64px",borderBottom:"1px solid #1a1a1a"}}>
              {r.emoji}
            </div>
          )}
          {/* Back + Edit buttons */}
          <div style={{position:"absolute",top:12,left:12,right:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <button onClick={onBack} style={{width:36,height:36,borderRadius:"50%",background:"rgba(0,0,0,0.6)",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(6px)"}}>‹</button>
            <button onClick={()=>onEdit(r)} style={{padding:"6px 14px",borderRadius:"20px",background:"rgba(0,0,0,0.6)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:600,backdropFilter:"blur(6px)",display:"flex",alignItems:"center",gap:5}}>✏️ Editar</button>
          </div>
        </div>

        {/* Scrollable content */}
        <div style={{flex:1,overflowY:"auto",padding:"16px 20px 24px"}}>
          {/* Restaurant info */}
          <div style={{marginBottom:"20px"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:10}}>
              {!r.photo&&<div style={{width:48,height:48,borderRadius:14,background:"#222",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{r.emoji}</div>}
              <div style={{flex:1}}>
                <h1 style={{fontSize:"22px",fontWeight:800,color:"#fff",letterSpacing:"-0.3px",margin:0}}>{r.name}</h1>
                <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
                  <Badge label={r.neighborhood} color="#777"/>
                  <Badge label={r.cuisine} color={cc}/>
                </div>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                {r.rating?<Stars rating={r.rating} size={20}/>:<span style={{color:"#555",fontSize:11}}>Sin calificar</span>}
                {r.eloScore!==undefined&&(
                  <div style={{background:"#f97316",borderRadius:10,padding:"4px 11px",display:"flex",alignItems:"center",gap:5}}>
                    <span style={{fontSize:20,fontWeight:900,color:"#fff",letterSpacing:"-0.5px",lineHeight:1}}>{r.eloScore.toFixed(1)}</span>
                    <span style={{fontSize:8,color:"rgba(255,255,255,0.7)",fontWeight:700,letterSpacing:"0.1em",lineHeight:1}}>ELO</span>
                  </div>
                )}
              </div>
              <span style={{fontSize:"12px",color:"#444"}}>📅 {formatDate(r.date)}</span>
            </div>
          </div>

          {/* Notes */}
          {(r.notes||r.notes_photo)&&(
            <div style={{background:"#1a1a1a",borderRadius:14,overflow:"hidden",marginBottom:"20px",border:"1px solid #242424"}}>
              {r.notes_photo&&(
                <div style={{position:"relative"}}>
                  <img src={r.notes_photo} style={{width:"100%",maxHeight:200,objectFit:"cover",display:"block"}}/>
                  <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 55%,rgba(26,26,26,0.95) 100%)"}}/>
                </div>
              )}
              <div style={{padding:"14px 16px"}}>
                <p style={{fontSize:"10px",fontWeight:700,color:"#555",letterSpacing:"0.1em",marginBottom:8}}>NOTAS DE CAMPO</p>
                {r.notes&&(
                  <>
                    <p style={{fontSize:"14px",color:"#bbb",lineHeight:1.7,display:expandNotes?"block":"-webkit-box",WebkitLineClamp:expandNotes?"unset":4,WebkitBoxOrient:"vertical",overflow:"hidden",cursor:"pointer"}} onClick={()=>setExpandNotes(!expandNotes)}>
                      "{r.notes}"
                    </p>
                    {!expandNotes&&r.notes.length>180&&<button onClick={()=>setExpandNotes(true)} style={{background:"none",border:"none",color:"#f97316",fontSize:"12px",cursor:"pointer",marginTop:4,padding:0}}>Ver más</button>}
                  </>
                )}
              </div>
            </div>
          )}

          {/* Fui con */}
          {r.went_with&&r.went_with.length>0&&(
            <div style={{background:"#1a1a1a",borderRadius:12,padding:"12px 14px",marginBottom:"16px",border:"1px solid #222"}}>
              <p style={{fontSize:"10px",fontWeight:700,color:"#555",letterSpacing:"0.1em",marginBottom:8}}>FUERON CON</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {r.went_with.map(w=>(<span key={w.id} style={{fontSize:12,padding:"4px 10px",borderRadius:"999px",background:"#f9731618",color:"#f97316",border:"1px solid #f9731633"}}>@{w.username}</span>))}
              </div>
            </div>
          )}

          {/* Platos destacados */}
          <div style={{marginBottom:"20px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <div>
                <p style={{fontSize:"10px",fontWeight:700,color:"#555",letterSpacing:"0.1em",marginBottom:2}}>PLATOS DESTACADOS</p>
                <p style={{fontSize:"12px",color:"#444"}}>{dishes.length===0?"Ninguno aún":`${dishes.length} registrado${dishes.length!==1?"s":""}`}</p>
              </div>
              <button onClick={()=>setShowAddDish(true)} style={{padding:"8px 14px",borderRadius:"20px",background:"#1a1a1a",border:"1px solid #333",color:"#fff",fontSize:"12px",fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                ＋ Plato
              </button>
            </div>
            {dishes.length===0?(
              <div style={{textAlign:"center",padding:"20px",background:"#1a1a1a",borderRadius:12,border:"1px dashed #2a2a2a"}}>
                <p style={{fontSize:"13px",color:"#444"}}>Mantén presionado un plato para eliminarlo</p>
              </div>
            ):(
              <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,scrollbarWidth:"none",msOverflowStyle:"none",WebkitOverflowScrolling:"touch"}}>
                {dishes.map(dish=>(
                  <div key={dish.id}
                    onMouseDown={()=>{dishTimerRef.current=setTimeout(()=>setDeletingDishId(dish.id),600);}}
                    onMouseUp={()=>clearTimeout(dishTimerRef.current)}
                    onTouchStart={()=>{dishTimerRef.current=setTimeout(()=>setDeletingDishId(dish.id),600);}}
                    onTouchEnd={()=>clearTimeout(dishTimerRef.current)}
                    style={{flexShrink:0,background:deletingDishId===dish.id?"#ef444422":"#1a1a1a",border:`1px solid ${deletingDishId===dish.id?"#ef4444":"#2a2a2a"}`,borderRadius:12,padding:"10px 12px",minWidth:120,maxWidth:160,cursor:"pointer",transition:"all 0.2s",userSelect:"none"}}>
                    {deletingDishId===dish.id?(
                      <div style={{display:"flex",flexDirection:"column",gap:6}} onClick={e=>e.stopPropagation()}>
                        <p style={{margin:0,fontSize:11,color:"#ef4444",fontWeight:700,textAlign:"center"}}>¿Eliminar?</p>
                        <div style={{display:"flex",gap:4}}>
                          <button onClick={()=>{onDeleteDish(r.id,dish.id);setDeletingDishId(null);}} style={{flex:1,padding:"4px",borderRadius:6,background:"#ef4444",border:"none",color:"#fff",fontSize:10,cursor:"pointer"}}>Sí</button>
                          <button onClick={()=>setDeletingDishId(null)} style={{flex:1,padding:"4px",borderRadius:6,background:"#2a2a2a",border:"1px solid #333",color:"#aaa",fontSize:10,cursor:"pointer"}}>No</button>
                        </div>
                      </div>
                    ):(
                      <>
                        <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
                          <span style={{fontSize:16}}>{DISH_RATING_ICONS[dish.rating]||"👍"}</span>
                          <span style={{fontSize:12,fontWeight:700,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{dish.name}</span>
                        </div>
                        {dish.notes&&<p style={{margin:0,fontSize:11,color:"#666",lineHeight:1.4,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{dish.notes}</p>}
                      </>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Comentarios — solo para restaurantes sincronizados (públicos) */}
          {user&&typeof r.id==="string"&&(
            <div style={{marginBottom:"20px"}}>
              <p style={{fontSize:"10px",fontWeight:700,color:"#555",letterSpacing:"0.1em",marginBottom:8}}>COMENTARIOS</p>
              <div style={{background:"#1a1a1a",borderRadius:14,padding:"12px 16px",border:"1px solid #242424"}}>
                <CommentsSection restaurantId={r.id} currentUser={user} isOwner={true} previewMode={false}/>
              </div>
            </div>
          )}

        </div>

        {showAddDish&&<AddDishModal onSave={dish=>{onAddDish(r.id,dish);setShowAddDish(false);}} onClose={()=>setShowAddDish(false)}/>}
      </div>
    );
  }

              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:6}}>
                <h3 style={{margin:0,fontSize:"15px",fontWeight:700,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</h3>

                  <button onClick={e=>{e.stopPropagation();onEdit(r);}} style={{background:"none",border:"none",color:"#444",fontSize:14,cursor:"pointer",padding:"2px 4px",lineHeight:1}}
                    onMouseEnter={e=>e.currentTarget.style.color="#f97316"} onMouseLeave={e=>e.currentTarget.style.color="#444"}>✏️</button>

              <span style={{fontSize:"11px",color:"#333"}}>mantén para borrar</span>
            </div>
          </div>

      </div>
    );
  }

  // ── Add/Edit Modal ─────────────────────────────────────────────────────────
  const GTYPE_TO_CUISINE={seafood_restaurant:"Mariscos",sushi_restaurant:"Japonesa",japanese_restaurant:"Japonesa",chinese_restaurant:"Chifa",italian_restaurant:"Italiana",steak_house:"Parrilla",peruvian_restaurant:"Criolla",bar:"Bar",bakery:"Panadería",sandwich_shop:"Sanguchería / Cafetería",cafe:"Sanguchería / Cafetería",mexican_restaurant:"Mexicana"};

  function AddEditModal({initial,prefillData,onSave,onClose,onDelete,allLists,user}){
    const isEdit=!!initial;
    const[form,setForm]=useState(()=>{
      if(initial)return{...initial,lists:initial.lists||getAutoLists(initial)};
      const base={emoji:"🍽️",name:"",neighborhood:"Miraflores",cuisine:"Cevichería",rating:0,notes:"",notes_photo:null,date:new Date().toISOString().split("T")[0],photo:null,dishes:[],lists:["restaurants"],went_with:[]};
      if(prefillData)return{...base,name:prefillData.name||"",lat:prefillData.lat,lng:prefillData.lng,place_id:prefillData.place_id,cuisine:GTYPE_TO_CUISINE[prefillData.primaryType]||"Cevichería",lists:getAutoLists(prefillData)};
      return base;
    });
    const[confirmDelete,setConfirmDelete]=useState(false);
    const[friendsList,setFriendsList]=useState([]);
    useEffect(()=>{
      if(!user)return;
      let cancelled=false;
      (async()=>{
        const{data:fs}=await sb.from("friendships").select("requester_id,addressee_id")
          .or(`requester_id.eq.${user.id},addressee_id.eq.${user.id}`).eq("status","accepted");
        if(cancelled)return;
        const ids=(fs||[]).map(f=>f.requester_id===user.id?f.addressee_id:f.requester_id);
        if(ids.length>0){const{data:profiles}=await sb.from("profiles").select("id,username,name").in("id",ids);if(!cancelled)setFriendsList(profiles||[]);}
      })();
      return()=>{cancelled=true;};
    },[user]);
    const[showEmoji,setShowEmoji]=useState(false);
    const[err,setErr]=useState("");
    const[saving,setSaving]=useState(false);
    useEffect(()=>{const h=e=>{if(e.key==="Escape")onClose();};document.addEventListener("keydown",h);return()=>document.removeEventListener("keydown",h);},[]);
    const[placeSearch,setPlaceSearch]=useState("");
    const[placeSuggestions,setPlaceSuggestions]=useState([]);
    const[showSuggestions,setShowSuggestions]=useState(false);
    const[loadingPlace,setLoadingPlace]=useState(false);
    const debounceRef=useRef(null);
    const[placeFilled,setPlaceFilled]=useState(!!(prefillData?.name));
    const[filledPlaceName,setFilledPlaceName]=useState(prefillData?.name||"");
    const set=(k,v)=>setForm(f=>({...f,[k]:v}));
    const save=async()=>{if(!form.name.trim()){setErr("El nombre es obligatorio.");return;}if(!form.rating){setErr("Elige una calificación.");return;}setSaving(true);await onSave({...form,id:isEdit?form.id:Date.now()});setSaving(false);};
    const PLACES_KEY="AIzaSyBJz5LMmNFD5rkaoSB8FaVQjj2aMiglRy0";
    const fetchPlaceSuggestions=async(query)=>{
      if(!query||query.length<2){setPlaceSuggestions([]);setShowSuggestions(false);return;}
      try{
        const res=await fetch("https://places.googleapis.com/v1/places:autocomplete",{
          method:"POST",
          headers:{"Content-Type":"application/json","X-Goog-Api-Key":PLACES_KEY},
          body:JSON.stringify({
            input:query,
            locationBias:{circle:{center:{latitude:-12.0464,longitude:-77.0428},radius:30000}},
            includedPrimaryTypes:["restaurant","cafe","bakery","bar"],
            languageCode:"es"
          })
        });
        if(!res.ok){const errText=await res.text();console.warn("Places API HTTP",res.status,":",errText);setPlaceSuggestions([]);setShowSuggestions(false);return;}
        const data=await res.json();
        const suggestions=data.suggestions||[];
        setPlaceSuggestions(suggestions);
        setShowSuggestions(suggestions.length>0);
      }catch(e){console.warn("Places API error:",e);setPlaceSuggestions([]);setShowSuggestions(false);}
    };
    useEffect(()=>{
      clearTimeout(debounceRef.current);
      if(!placeSearch||placeSearch.length<2){setPlaceSuggestions([]);setShowSuggestions(false);return;}
      debounceRef.current=setTimeout(()=>fetchPlaceSuggestions(placeSearch),350);
      return()=>clearTimeout(debounceRef.current);
    },[placeSearch]);
    const selectPlace=async(suggestion)=>{
      setShowSuggestions(false);setLoadingPlace(true);
      try{
        const placeId=suggestion.placePrediction?.placeId;
        if(!placeId)throw new Error("No placeId");
        const res=await fetch(`https://places.googleapis.com/v1/places/${placeId}?fields=displayName,formattedAddress,location,photos,addressComponents&key=${PLACES_KEY}`);
        const place=await res.json();
        const ac=place.addressComponents||[];
        const distComp=ac.find(c=>c.types&&(c.types.includes("locality")||c.types.includes("sublocality_level_1")||c.types.includes("administrative_area_level_3")));
        const detectedDist=distComp?.longText||"";
        const matchedNeighborhood=NEIGHBORHOODS.find(n=>n.toLowerCase()===detectedDist.toLowerCase())||form.neighborhood;
        const lat=place.location?.latitude;
        const lng=place.location?.longitude;
        let photo=form.photo;
        if(!photo&&place.photos&&place.photos.length>0){
          try{
            const photoName=place.photos[0].name;
            photo=`https://places.googleapis.com/v1/${photoName}/media?maxWidthPx=800&key=${PLACES_KEY}`;
          }catch{}
        }
        const displayName=place.displayName?.text||place.displayName||"";
        setForm(f=>{const u={...f,name:displayName||f.name,neighborhood:matchedNeighborhood,photo};if(lat&&lng){u.lat=lat;u.lng=lng;}return u;});
        setPlaceSearch("");setErr("");setPlaceFilled(true);setFilledPlaceName(displayName||"Restaurante");
      }catch(e){console.warn("Place detail error:",e);}
      setLoadingPlace(false);
    };
    const inp={width:"100%",background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:"10px",padding:"10px 12px",color:"#fff",fontSize:"14px",outline:"none",boxSizing:"border-box"};
    const lbl={display:"block",fontSize:"10px",fontWeight:700,color:"#555",letterSpacing:"0.08em",marginBottom:"6px"};
    return(
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",flexDirection:"column",justifyContent:"flex-end",zIndex:9999,backdropFilter:"blur(6px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div className="slide-up" style={{background:"#111",borderRadius:"24px 24px 0 0",maxHeight:"92%",display:"flex",flexDirection:"column",border:"1px solid #222",borderBottom:"none"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 20px 0",flexShrink:0}}>
            <button onClick={onClose} style={{background:"none",border:"none",color:"#777",fontSize:"15px",cursor:"pointer"}}>Cancelar</button>
            <button onClick={save} disabled={saving} style={{background:saving?"#7c3a13":"#f97316",border:"none",color:"#fff",fontSize:"15px",fontWeight:700,cursor:saving?"not-allowed":"pointer",borderRadius:"8px",padding:"6px 16px",transition:"background 0.2s"}}>{saving?"Guardando…":(isEdit?"Guardar":"Registrar")}</button>
          </div>
          <div style={{display:"flex",justifyContent:"center",padding:"10px 0 0"}}><div style={{width:36,height:4,borderRadius:2,background:"#2a2a2a"}}/></div>
          <div style={{overflowY:"auto",padding:"14px 20px 50px",display:"flex",flexDirection:"column",gap:15}}>
            {!isEdit&&!placeFilled&&(
              <div style={{position:"relative"}}>
                <label style={lbl}>🔍 BUSCAR RESTAURANTE EN LIMA</label>
                <div style={{position:"relative"}}>
                  <input
                    value={placeSearch}
                    onChange={e=>setPlaceSearch(e.target.value)}
                    onFocus={()=>placeSearch.length>=2&&placeSuggestions.length>0&&setShowSuggestions(true)}
                    onBlur={()=>setTimeout(()=>setShowSuggestions(false),180)}
                    placeholder="Escribe el nombre del restaurante…"
                    style={{...inp,paddingRight:loadingPlace?"36px":"12px"}}
                    autoFocus
                  />
                  {loadingPlace&&<span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#f97316",animation:"spin 1s linear infinite"}}>⏳</span>}
                </div>
                {showSuggestions&&placeSuggestions.length>0&&(
                  <div className="places-dropdown">
                    {placeSuggestions.map((s,i)=>{
                      const pred=s.placePrediction;
                      const main=pred?.structuredFormat?.mainText?.text||pred?.text?.text||"";
                      const secondary=pred?.structuredFormat?.secondaryText?.text||"";
                      return(
                        <div key={i} className="places-item" onMouseDown={()=>selectPlace(s)}>
                          <span className="places-icon">🍽️</span>
                          <div style={{flex:1,minWidth:0}}>
                            <div className="places-text">{main}</div>
                            {secondary&&<div className="places-sub">{secondary}</div>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
                {!loadingPlace&&placeSearch.length>0&&placeSuggestions.length===0&&showSuggestions===false&&placeSearch.length>=2&&(
                  <p style={{fontSize:"11px",color:"#555",marginTop:5}}>No se encontraron resultados. Completa el formulario manualmente.</p>
                )}
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>
                  <div style={{flex:1,height:"1px",background:"#2a2a2a"}}/>
                  <span style={{fontSize:"10px",color:"#444",fontWeight:700,letterSpacing:"0.08em"}}>O COMPLETA MANUALMENTE</span>
                  <div style={{flex:1,height:"1px",background:"#2a2a2a"}}/>
                </div>
              </div>
            )}
            {!isEdit&&placeFilled&&(
              <div style={{background:"#f9731612",border:"1px solid #f9731630",borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>📍</span>
                <div style={{flex:1}}>
                  <p style={{margin:0,fontSize:13,fontWeight:700,color:"#fff"}}>{filledPlaceName}</p>
                  <p style={{margin:"2px 0 0",fontSize:11,color:"#f97316"}}>Datos completados desde Google Places</p>
                </div>
                <button onClick={()=>{setPlaceFilled(false);setFilledPlaceName("");set("name","");set("neighborhood","Miraflores");}} style={{background:"none",border:"none",color:"#666",fontSize:16,cursor:"pointer",lineHeight:1,padding:"4px"}}>✕</button>
              </div>
            )}
            {err&&<div style={{background:"#ef444422",border:"1px solid #ef4444",borderRadius:"8px",padding:"10px 14px",fontSize:"13px",color:"#ef4444"}}>{err}</div>}
            <div style={{display:"flex",gap:10,alignItems:"flex-start",position:"relative"}}>
              <div>
                <button onClick={()=>setShowEmoji(!showEmoji)} style={{width:54,height:54,borderRadius:14,background:"#1a1a1a",border:"1px solid #2a2a2a",fontSize:25,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{form.emoji}</button>
                {showEmoji&&(<div style={{position:"absolute",background:"#1e1e1e",border:"1px solid #2a2a2a",borderRadius:12,padding:10,display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:4,zIndex:200,boxShadow:"0 8px 32px rgba(0,0,0,0.7)",top:58,left:0,width:200}}>
                  {EMOJIS.map(e=>(<button key={e} onClick={()=>{set("emoji",e);setShowEmoji(false);}} style={{background:form.emoji===e?"#f9731622":"none",border:form.emoji===e?"1px solid #f97316":"1px solid transparent",borderRadius:8,fontSize:20,cursor:"pointer",padding:4,lineHeight:1}}>{e}</button>))}
                </div>)}
              </div>
              {(!placeFilled||isEdit)&&<div style={{flex:1}}><label style={lbl}>NOMBRE *</label><input value={form.name} onChange={e=>{set("name",e.target.value);setErr("");}} placeholder="Ej: La Picantería" style={inp} autoFocus={isEdit}/></div>}
            </div>
            <div><label style={lbl}>FOTO PORTADA</label><PhotoPicker value={form.photo} onChange={v=>set("photo",v)}/></div>
            {(!placeFilled||isEdit)&&<div><label style={lbl}>DISTRITO</label><select value={form.neighborhood} onChange={e=>set("neighborhood",e.target.value)} style={inp}>{NEIGHBORHOODS.map(n=><option key={n} value={n}>{n}</option>)}</select></div>}
            <div><label style={lbl}>TIPO DE COCINA</label><select value={form.cuisine} onChange={e=>set("cuisine",e.target.value)} style={inp}>{CUISINES.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
            <div>
              <label style={lbl}>CALIFICACIÓN *</label>
              <div style={{display:"flex",alignItems:"center",gap:12,marginTop:6}}>
                <Stars rating={form.rating} interactive onChange={v=>{set("rating",v);setErr("");}} size={32}/>
                {form.rating>0&&<span style={{fontSize:"13px",color:"#888"}}>{["","Malo","Regular","Bueno","Muy bueno","Excelente"][form.rating]}</span>}
              </div>
            </div>
            <div><label style={lbl}>FECHA DE VISITA</label><input type="date" value={form.date} onChange={e=>set("date",e.target.value)} style={{...inp,colorScheme:"dark"}}/></div>
            <div><label style={lbl}>NOTAS DE CAMPO</label><textarea value={form.notes} onChange={e=>set("notes",e.target.value)} placeholder="¿Qué pediste? ¿Qué te sorprendió? ¿Volverías?" rows={4} style={{...inp,resize:"none",lineHeight:1.6}}/></div>
            {friendsList.length>0&&(
              <div>
                <label style={lbl}>¿FUISTE CON ALGUIEN?</label>
                <div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:2}}>
                  {friendsList.map(f=>{
                    const sel=(form.went_with||[]).some(w=>w.id===f.id);
                    return(
                      <button key={f.id} onClick={()=>{const cur=form.went_with||[];const next=sel?cur.filter(w=>w.id!==f.id):[...cur,{id:f.id,username:f.username,name:f.name}];set("went_with",next);}} style={{padding:"7px 13px",borderRadius:"999px",background:sel?"#f9731622":"#1a1a1a",border:`1.5px solid ${sel?"#f97316":"#2a2a2a"}`,color:sel?"#fff":"#888",fontSize:12,cursor:"pointer",fontWeight:sel?700:400,transition:"all 0.15s"}}>
                        @{f.username}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}
            {allLists&&allLists.filter(l=>l.id!=="all").length>0&&(
              <div>
                <label style={lbl}>GUARDAR EN LISTA</label>
                <div style={{display:"flex",flexDirection:"column",gap:7}}>
                  {allLists.filter(l=>l.id!=="all").map(list=>{
                    const checked=(form.lists||[]).includes(list.id);
                    const col=list.color||"#f97316";
                    return(
                      <div key={list.id} onClick={()=>{const cur=form.lists||[];set("lists",checked?cur.filter(id=>id!==list.id):[...cur,list.id]);}} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:10,background:checked?col+"12":"#1a1a1a",border:`1px solid ${checked?col+"44":"#2a2a2a"}`,cursor:"pointer",transition:"all 0.15s"}}>
                        <div style={{width:22,height:22,borderRadius:6,background:checked?col:"#2a2a2a",border:`1px solid ${checked?col:"#444"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",flexShrink:0,transition:"all 0.15s"}}>{checked&&"✓"}</div>
                        <span style={{fontSize:17}}>{list.emoji}</span>
                        <span style={{fontSize:14,color:checked?"#fff":"#888",fontWeight:checked?600:400,transition:"all 0.15s"}}>{list.name}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
            {isEdit&&onDelete&&(
              <div style={{marginTop:8,paddingTop:16,borderTop:"1px solid #1e1e1e"}}>
                {!confirmDelete?(
                  <button onClick={()=>setConfirmDelete(true)} style={{width:"100%",padding:"11px",borderRadius:10,background:"transparent",border:"1px solid #2a2a2a",color:"#555",fontSize:13,cursor:"pointer",transition:"all 0.2s"}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor="#ef4444";e.currentTarget.style.color="#ef4444";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor="#2a2a2a";e.currentTarget.style.color="#555";}}>
                    Eliminar hallazgo
                  </button>
                ):(
                  <div style={{background:"#ef444411",border:"1px solid #ef444433",borderRadius:10,padding:"14px 16px"}}>
                    <p style={{margin:"0 0 12px",fontSize:13,color:"#ef4444",textAlign:"center"}}>¿Eliminar <strong>{form.name}</strong>? Esta acción no se puede deshacer.</p>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={onDelete} style={{flex:1,padding:"10px",borderRadius:8,background:"#ef4444",border:"none",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Sí, eliminar</button>
                      <button onClick={()=>setConfirmDelete(false)} style={{flex:1,padding:"10px",borderRadius:8,background:"#2a2a2a",border:"1px solid #333",color:"#aaa",fontSize:13,cursor:"pointer"}}>Cancelar</button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ── Create List Modal ──────────────────────────────────────────────────────

    const[name,setName]=useState("");
    const[emoji,setEmoji]=useState("📍");
    const[err,setErr]=useState("");
    useEffect(()=>{const h=e=>{if(e.key==="Escape")onClose();};document.addEventListener("keydown",h);return()=>document.removeEventListener("keydown",h);},[]);
    const LIST_EMOJIS=["📍","⭐","🎯","💫","🔖","❤️"];

    return(
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",flexDirection:"column",justifyContent:"flex-end",zIndex:9999,backdropFilter:"blur(6px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>

            </>
          )}
          {renaming&&(
            <>
              <p style={{fontSize:14,fontWeight:700,color:"#fff",marginBottom:12}}>Renombrar lista</p>

              </div>
            </>

  // ── ELO Comparison Screen ──────────────────────────────────────────────────
  function EloComparisonScreen({restaurants,newRestaurantId,onComplete,onUpdateElo}){
    const[step,setStep]=useState(0);
    const[animWinner,setAnimWinner]=useState(null);
    const[closing,setClosing]=useState(false);
    const opponentIds=useRef(null);
    if(!opponentIds.current){
      const others=restaurants.filter(r=>r.id!==newRestaurantId);
      const sorted=[...others].sort((a,b)=>{const d=(a.eloComparisons||0)-(b.eloComparisons||0);return d!==0?d:Math.random()-0.5;});
      opponentIds.current=sorted.slice(0,Math.min(3,sorted.length)).map(r=>r.id);
    }
    const maxSteps=opponentIds.current.length;
    const newR=restaurants.find(r=>r.id===newRestaurantId);
    const opponent=restaurants.find(r=>r.id===opponentIds.current[step]);
    const finish=()=>{setClosing(true);setTimeout(onComplete,280);};
    if(!newR||!opponent){onComplete();return null;}
    const pick=(winnerId)=>{
      if(animWinner!=null)return;
      const loserId=winnerId===newR.id?opponent.id:newR.id;
      setAnimWinner(winnerId);
      setTimeout(()=>{
        onUpdateElo(winnerId,loserId);
        if(step+1>=maxSteps){setTimeout(()=>{setClosing(true);setTimeout(onComplete,280);},120);}
        else{setStep(s=>s+1);setAnimWinner(null);}
      },460);
    };
    const EloCard=({r})=>{
      const isWinner=animWinner===r.id;
      return(
        <div onClick={()=>pick(r.id)} style={{flex:1,background:"#1a1a1a",borderRadius:20,padding:"22px 14px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:12,cursor:"pointer",border:`2px solid ${isWinner?"#f97316":"#2a2a2a"}`,transform:isWinner?"scale(1.05)":"scale(1)",transition:"transform 0.22s ease,border-color 0.22s ease,box-shadow 0.22s ease",boxShadow:isWinner?"0 0 28px rgba(249,115,22,0.4)":"none",userSelect:"none",WebkitUserSelect:"none",WebkitTapHighlightColor:"transparent"}}>
          <span style={{fontSize:52,lineHeight:1}}>{r.emoji}</span>
          <p style={{fontSize:15,fontWeight:700,color:"#fff",margin:0,textAlign:"center",lineHeight:1.3}}>{r.name}</p>
          <p style={{fontSize:12,color:"#555",margin:0}}>{r.neighborhood}</p>
          <div style={{background:"rgba(249,115,22,0.15)",border:"1px solid rgba(249,115,22,0.3)",borderRadius:"999px",padding:"4px 14px",marginTop:2}}>
            <span style={{fontSize:16,fontWeight:900,color:"#f97316",letterSpacing:"-0.3px"}}>{(r.eloScore||5.0).toFixed(1)}</span>
          </div>
        </div>
      );
    };
    return(
      <div style={{position:"absolute",inset:0,background:"#0a0a0a",zIndex:200,display:"flex",flexDirection:"column",opacity:closing?0:1,transition:"opacity 0.28s ease"}}>
        <div style={{padding:"30px 20px 10px",textAlign:"center",flexShrink:0}}>
          <p style={{fontSize:10,fontWeight:700,color:"rgba(249,115,22,0.55)",letterSpacing:"0.22em",margin:"0 0 8px"}}>DUELO GASTRONÓMICO</p>
          <h2 style={{fontSize:22,fontWeight:800,color:"#fff",margin:"0 0 6px",letterSpacing:"-0.3px"}}>¿Cuál preferiste?</h2>
          <p style={{fontSize:12,color:"#555",margin:0}}>Comparación {step+1} de {maxSteps}</p>
        </div>
        <div style={{display:"flex",gap:6,padding:"12px 24px 0",flexShrink:0}}>
          {Array.from({length:maxSteps}).map((_,i)=>(
            <div key={i} style={{flex:1,height:3,borderRadius:2,background:i<step?"#f97316":i===step?"#f9731688":"#222",transition:"all 0.35s"}}/>
          ))}
        </div>
        <div style={{flex:1,display:"flex",gap:12,padding:"18px 16px 0",alignItems:"stretch",maxHeight:400}}>
          <EloCard r={newR}/>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,width:28}}>
            <span style={{fontSize:11,fontWeight:800,color:"#333",letterSpacing:"0.05em"}}>VS</span>
          </div>
          <EloCard r={opponent}/>
        </div>
        <div style={{textAlign:"center",padding:"20px 20px 28px",flexShrink:0}}>
          <button onClick={finish} style={{background:"none",border:"none",color:"#2a2a2a",fontSize:11,cursor:"pointer",letterSpacing:"0.04em",padding:"6px 16px"}}>Saltar</button>
        </div>
      </div>
    );
  }

  // ── Map Screen ─────────────────────────────────────────────────────────────
  function chipStyle(active,color){return{padding:"5px 12px",borderRadius:"999px",background:active?color:"#1a1a1a",border:`1px solid ${active?color:"#2a2a2a"}`,color:active?"#fff":"#777",fontSize:11,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0};}
  function haversineM(la1,lo1,la2,lo2){const R=6371000,f1=la1*Math.PI/180,f2=la2*Math.PI/180,df=(la2-la1)*Math.PI/180,dl=(lo2-lo1)*Math.PI/180,a=Math.sin(df/2)**2+Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
  function fmtDist(m){return m<1000?`${Math.round(m)} m`:`${(m/1000).toFixed(1)} km`;}
  const GTYPE_ES={restaurant:"Restaurante",cafe:"Café",bar:"Bar",bakery:"Panadería",fast_food_restaurant:"Fast Food",pizza_restaurant:"Pizza",seafood_restaurant:"Mariscos",sushi_restaurant:"Sushi",japanese_restaurant:"Japonesa",chinese_restaurant:"Chifa",italian_restaurant:"Italiana",peruvian_restaurant:"Peruana",steak_house:"Parrilla",vegetarian_restaurant:"Vegetariana",sandwich_shop:"Sándwiches",ice_cream_shop:"Helados",brunch_restaurant:"Brunch",meal_delivery:"Delivery"};
  const MAP_GKEY="AIzaSyBJz5LMmNFD5rkaoSB8FaVQjj2aMiglRy0";

  function MapScreen({restaurants,onOpenDetail,onAddRestaurant}){
    const mapDiv=useRef(null),leaflet=useRef(null),layerRef=useRef(null),userMarkerRef=useRef(null);
    const[filterSource,setFilterSource]=useState("all"); // all|mine|google
    const[filterSubtype,setFilterSubtype]=useState("");
    const[filterNeighborhood,setFilterNeighborhood]=useState("");
    const[filterNearby,setFilterNearby]=useState(false);
    const[selected,setSelected]=useState(null);
    const[selectedGoogle,setSelectedGoogle]=useState(null);
    const[googleModalOpen,setGoogleModalOpen]=useState(false);
    const[userPos,setUserPos]=useState(null);
    const[sheetOpen,setSheetOpen]=useState(false);
    const[googlePlaces,setGooglePlaces]=useState([]);
    const[loadingGoogle,setLoadingGoogle]=useState(false);
    const[searchPos,setSearchPos]=useState(null);

    const cuisines=[...new Set(restaurants.map(r=>r.cuisine))].sort();
    const neighborhoods=[...new Set(restaurants.map(r=>r.neighborhood))].sort();
    const googleTypes=[...new Set(googlePlaces.map(g=>g.primaryType).filter(Boolean))].sort();
    const noFilters=filterSource==="all"&&!filterSubtype&&!filterNearby&&!filterNeighborhood;

    const filteredPersonal=(filterSource==="google")?[]:restaurants.filter(r=>{
      if(filterSubtype&&r.cuisine!==filterSubtype)return false;
      if(filterNeighborhood&&r.neighborhood!==filterNeighborhood)return false;
      if(filterNearby&&userPos){const[la,lo]=getCoords(r);return haversineM(userPos.lat,userPos.lng,la,lo)<1000;}
      return true;
    });
    const filteredGoogle=(filterSource==="mine")?[]:googlePlaces.filter(g=>{
      if(filterSubtype&&g.primaryType!==filterSubtype)return false;
      if(filterNearby&&userPos)return haversineM(userPos.lat,userPos.lng,g.lat,g.lng)<1000;
      return true;
    });
    const totalCount=filteredPersonal.length+filteredGoogle.length;
    const sheetItems=[
      ...filteredPersonal.map(r=>{const[la,lo]=getCoords(r);return{...r,_dist:userPos?haversineM(userPos.lat,userPos.lng,la,lo):null};}),
      ...filteredGoogle.map(g=>({...g,_dist:userPos?haversineM(userPos.lat,userPos.lng,g.lat,g.lng):null}))
    ].sort((a,b)=>(a._dist??999999)-(b._dist??999999));

    // Fetch Google Places Nearby
    const doFetchGoogle=async(lat,lng)=>{
      setLoadingGoogle(true);
      try{
        const res=await fetch("https://places.googleapis.com/v1/places:searchNearby",{method:"POST",headers:{"Content-Type":"application/json","X-Goog-Api-Key":MAP_GKEY,"X-Goog-FieldMask":"places.id,places.displayName,places.formattedAddress,places.location,places.rating,places.userRatingCount,places.primaryType"},body:JSON.stringify({includedTypes:["restaurant","cafe","bar","bakery"],maxResultCount:20,locationRestriction:{circle:{center:{latitude:lat,longitude:lng},radius:1500}}})});
        const data=await res.json();
        setGooglePlaces((data.places||[]).map(p=>({id:p.id,name:p.displayName?.text||"",lat:p.location?.latitude,lng:p.location?.longitude,rating:p.rating,userRatingCount:p.userRatingCount,primaryType:p.primaryType||"restaurant",address:p.formattedAddress||"",isGoogle:true})));
      }catch(e){console.warn("Google Nearby:",e);}
      setLoadingGoogle(false);
    };

    // Init map + geolocation
    useEffect(()=>{
      if(!mapDiv.current||leaflet.current)return;
      const map=L.map(mapDiv.current,{center:[-12.1219,-77.0281],zoom:13});
      L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{attribution:'&copy; <a href="https://carto.com/">CARTO</a>',subdomains:"abcd",maxZoom:19}).addTo(map);
      leaflet.current=map;
      if(navigator.geolocation){navigator.geolocation.getCurrentPosition(pos=>{const{latitude:lat,longitude:lng}=pos.coords;setUserPos({lat,lng});setSearchPos({lat,lng});map.setView([lat,lng],14);},()=>{});}
      return()=>{map.remove();leaflet.current=null;};
    },[]);

    // Fetch when searchPos changes
    useEffect(()=>{if(searchPos)doFetchGoogle(searchPos.lat,searchPos.lng);},[searchPos]);

    // User location pin
    useEffect(()=>{
      const map=leaflet.current;if(!map||!userPos)return;
      if(userMarkerRef.current)userMarkerRef.current.remove();
      const icon=L.divIcon({html:`<div class="user-loc-pin"><div class="user-loc-pulse"></div><div class="user-loc-dot"></div></div>`,className:"",iconSize:[40,40],iconAnchor:[20,20]});
      userMarkerRef.current=L.marker([userPos.lat,userPos.lng],{icon,zIndexOffset:1000}).addTo(map).bindTooltip("Estás aquí",{permanent:false,direction:"top"});
    },[userPos]);

    // All markers with clustering
    useEffect(()=>{
      const map=leaflet.current;if(!map)return;
      if(layerRef.current){map.removeLayer(layerRef.current);layerRef.current=null;}
      const useCluster=typeof L.markerClusterGroup==="function";
      const layer=useCluster?L.markerClusterGroup({maxClusterRadius:55,showCoverageOnHover:false,spiderfyOnMaxZoom:true,iconCreateFunction:cl=>{const c=cl.getChildCount();return L.divIcon({html:`<div class="sabor-cluster"><span>${c}</span></div>`,className:"",iconSize:[40,40],iconAnchor:[20,20]});}}):L.layerGroup();
      // Personal pins (teardrop con emoji)
      filteredPersonal.forEach(r=>{
        const[lat,lng]=getCoords(r);const color=CUISINE_COLORS[r.cuisine]||"#f97316";
        const icon=L.divIcon({html:`<div class="sabor-pin" style="background:${color}"><div class="sabor-pin-inner">${r.emoji}</div></div>`,className:"",iconSize:[36,36],iconAnchor:[18,36]});
        L.marker([lat,lng],{icon}).on("click",()=>{setSelected(r);setSelectedGoogle(null);setSheetOpen(false);}).addTo(layer);
      });
      // Google pins (círculo azul)
      filteredGoogle.forEach(g=>{
        if(!g.lat||!g.lng)return;
        const icon=L.divIcon({html:`<div class="google-pin"><div class="google-pin-inner">🍽️</div></div>`,className:"",iconSize:[30,30],iconAnchor:[15,15]});
        L.marker([g.lat,g.lng],{icon}).on("click",()=>{setSelectedGoogle(g);setSelected(null);setSheetOpen(false);}).addTo(layer);
      });
      layer.addTo(map);layerRef.current=layer;
    },[filteredPersonal,filteredGoogle]);

    const flyTo=(lat,lng)=>{leaflet.current?.setView([lat,lng],16);};
    const resetFilters=()=>{setFilterSource("all");setFilterSubtype("");setFilterNearby(false);setFilterNeighborhood("");};

    return(
      <div style={{display:"flex",flexDirection:"column",height:"100%",position:"relative"}}>
        {/* Header */}
        <div style={{padding:"18px 20px 8px",flexShrink:0}}>
          <h2 style={{fontSize:"20px",fontWeight:800,color:"#fff",margin:0}}>Mapa de Lima <span style={{color:"#f97316"}}>📍</span></h2>
          <p style={{fontSize:"12px",color:"#555",marginTop:2}}>
            {totalCount} {totalCount===1?"lugar":"lugares"}
            {filteredPersonal.length>0&&<span style={{color:"#f97316"}}> · {filteredPersonal.length} tuyos</span>}
            {filteredGoogle.length>0&&<span style={{color:"#3b82f6"}}> · {filteredGoogle.length} Google</span>}
            {loadingGoogle&&<span style={{color:"#3b82f6",marginLeft:6}}>⏳</span>}
          </p>
          {/* Filter chips */}
          <div style={{display:"flex",gap:6,marginTop:10,overflowX:"auto",paddingBottom:4,scrollbarWidth:"none",msOverflowStyle:"none"}}>
            <button onClick={resetFilters} style={chipStyle(noFilters,"#f97316")}>Todos</button>
            <button onClick={()=>{setFilterSource(filterSource==="mine"?"all":"mine");setFilterSubtype("");setFilterNeighborhood("");}} style={chipStyle(filterSource==="mine"&&!filterSubtype,"#f97316")}>⭐ Mis hallazgos</button>
            <button onClick={()=>{setFilterSource(filterSource==="google"?"all":"google");setFilterSubtype("");}} style={chipStyle(filterSource==="google"&&!filterSubtype,"#3b82f6")}>🔍 Google</button>
            <button onClick={()=>setFilterNearby(v=>!v)} style={chipStyle(filterNearby,"#f97316")}>📍 Cercanos</button>
            {/* Cuisine chips (personales) */}
            {cuisines.length>0&&<div style={{width:1,flexShrink:0,background:"#2a2a2a",margin:"4px 2px"}}/>}
            {cuisines.map(c=>{const a=filterSource==="mine"&&filterSubtype===c;const col=CUISINE_COLORS[c]||"#f97316";return<button key={c} onClick={()=>{if(a){setFilterSubtype("");setFilterSource("mine");}else{setFilterSource("mine");setFilterSubtype(c);setFilterNeighborhood("");}}} style={chipStyle(a,col)}>{c}</button>;})}
            {/* Google type chips */}
            {googleTypes.length>0&&<div style={{width:1,flexShrink:0,background:"#2a2a2a",margin:"4px 2px"}}/>}
            {googleTypes.map(t=>{const a=filterSource==="google"&&filterSubtype===t;return<button key={t} onClick={()=>{if(a){setFilterSubtype("");setFilterSource("google");}else{setFilterSource("google");setFilterSubtype(t);}}} style={chipStyle(a,"#3b82f6")}>{GTYPE_ES[t]||t}</button>;})}
            {/* Barrio chips */}

          <div ref={mapDiv} style={{width:"100%",height:"100%"}}/>

          <button onClick={()=>{const c=leaflet.current?.getCenter();if(c)setSearchPos({lat:c.lat,lng:c.lng});}} style={{position:"absolute",top:10,left:"50%",transform:"translateX(-50%)",background:"#141414",border:"1px solid #333",borderRadius:20,padding:"6px 14px",color:loadingGoogle?"#3b82f6":"#ccc",fontSize:11,fontWeight:600,cursor:"pointer",zIndex:800,boxShadow:"0 2px 12px rgba(0,0,0,0.7)",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5,transition:"color 0.2s"}}>
            {loadingGoogle?"⏳ Buscando…":"🔍 Buscar restaurantes aquí"}
          </button>
          {/* Empty state overlay */}
          {!loadingGoogle&&totalCount===0&&(
            <div style={{position:"absolute",bottom:16,left:"50%",transform:"translateX(-50%)",background:"rgba(20,20,20,0.92)",backdropFilter:"blur(10px)",borderRadius:14,padding:"14px 20px",zIndex:800,textAlign:"center",border:"1px solid #2a2a2a",boxShadow:"0 4px 20px rgba(0,0,0,0.5)",maxWidth:260}}>

            {sheetOpen?"✕":"≡"}
