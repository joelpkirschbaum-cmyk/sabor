            {sheetItems.map((item,idx)=>{
              const isG=item.isGoogle;
              const handleClick=()=>{if(isG){flyTo(item.lat,item.lng);setSelectedGoogle(item);setSelected(null);}else{const[la,lo]=getCoords(item);flyTo(la,lo);setSelected(item);setSelectedGoogle(null);}setSheetOpen(false);};
              return(
                <div key={item.id||idx} onClick={handleClick} style={{padding:"8px 16px",display:"flex",gap:10,alignItems:"center",cursor:"pointer",borderBottom:"1px solid #1a1a1a"}} onMouseEnter={e=>e.currentTarget.style.background="#1e1e1e"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <div style={{width:32,height:32,borderRadius:isG?"50%":"8px",background:isG?"#0f172a":"#222",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,border:isG?"2px solid #3b82f6":"none"}}>{isG?"🍽️":item.emoji}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{margin:0,fontSize:13,fontWeight:600,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</p>
                    <p style={{margin:"1px 0 0",fontSize:10,color:isG?"#3b82f688":"#555",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{isG?(GTYPE_ES[item.primaryType]||item.primaryType):`${item.neighborhood} · ${item.cuisine}`}</p>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2,flexShrink:0}}>
                    {isG?<span style={{fontSize:11,fontWeight:700,color:"#fbbf24"}}>{item.rating?`★ ${item.rating.toFixed(1)}`:"—"}</span>:(item.rating?<Stars rating={item.rating} size={10}/>:<span style={{color:"#555",fontSize:11}}>Sin calificar</span>)}
                    {item._dist!=null&&<span style={{fontSize:10,fontWeight:700,color:item._dist<1000?"#f97316":"#666"}}>{fmtDist(item._dist)}</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Card: restaurante personal */}
        {selected&&!sheetOpen&&(
          <div style={{position:"absolute",bottom:8,left:12,right:12,background:"#1a1a1a",borderRadius:16,padding:"14px 16px",border:"1px solid #333",zIndex:1000,boxShadow:"0 -4px 24px rgba(0,0,0,0.5)"}}>
            <button onClick={()=>setSelected(null)} style={{position:"absolute",top:12,right:14,background:"none",border:"none",color:"#555",fontSize:16,cursor:"pointer"}}>✕</button>
            <div style={{display:"flex",gap:10,alignItems:"center",cursor:"pointer"}} onClick={()=>{onOpenDetail(selected);setSelected(null);}}>
              <div style={{width:40,height:40,borderRadius:10,background:"#222",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{selected.emoji}</div>
              <div style={{flex:1,minWidth:0}}>
                <h3 style={{margin:0,fontSize:15,fontWeight:700,color:"#fff"}}>{selected.name}</h3>
                <div style={{display:"flex",gap:5,marginTop:4,flexWrap:"wrap"}}><Badge label={selected.neighborhood} color="#777"/><Badge label={selected.cuisine} color={CUISINE_COLORS[selected.cuisine]||"#f97316"}/></div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                {selected.rating?<Stars rating={selected.rating} size={13}/>:<span style={{color:"#555",fontSize:11}}>Sin calificar</span>}
                {userPos&&(()=>{const[la,lo]=getCoords(selected);return<span style={{fontSize:11,color:"#f97316"}}>{fmtDist(haversineM(userPos.lat,userPos.lng,la,lo))}</span>;})()}
                <span style={{fontSize:11,color:"#f97316"}}>Ver →</span>
              </div>
            </div>
            {selected.notes&&<p style={{margin:"10px 0 0",fontSize:12,color:"#777",lineHeight:1.5,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>"{selected.notes}"</p>}
          </div>
        )}

        {/* Card: lugar de Google */}
        {selectedGoogle&&!sheetOpen&&!googleModalOpen&&(
          <div style={{position:"absolute",bottom:8,left:12,right:12,background:"#0b1628",borderRadius:16,padding:"14px 16px",border:"1px solid #1e3a5f",zIndex:1000,boxShadow:"0 -4px 24px rgba(0,0,0,0.6)"}}>
            <button onClick={()=>setSelectedGoogle(null)} style={{position:"absolute",top:12,right:14,background:"none",border:"none",color:"#555",fontSize:16,cursor:"pointer"}}>✕</button>
            <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
              <div style={{width:40,height:40,borderRadius:"50%",background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,border:"2px solid #3b82f6"}}>🍽️</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                  <h3 style={{margin:0,fontSize:15,fontWeight:700,color:"#fff"}}>{selectedGoogle.name}</h3>
                  <span style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:"#3b82f622",color:"#3b82f6",fontWeight:700,flexShrink:0,border:"1px solid #3b82f633"}}>Google</span>
                </div>
                <p style={{margin:"3px 0 0",fontSize:11,color:"#445",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{selectedGoogle.address}</p>
                <div style={{display:"flex",gap:8,marginTop:6,alignItems:"center",flexWrap:"wrap"}}>
                  {selectedGoogle.rating&&<span style={{fontSize:13,color:"#fbbf24",fontWeight:700}}>★ {selectedGoogle.rating.toFixed(1)}</span>}
                  {selectedGoogle.primaryType&&<Badge label={GTYPE_ES[selectedGoogle.primaryType]||selectedGoogle.primaryType} color="#3b82f6"/>}
                  {userPos&&<span style={{fontSize:11,color:"#f97316",fontWeight:600}}>{fmtDist(haversineM(userPos.lat,userPos.lng,selectedGoogle.lat,selectedGoogle.lng))}</span>}
                </div>
              </div>
            </div>
            {/* Botones */}
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <button onClick={()=>setGoogleModalOpen(true)} style={{flex:1,padding:"9px",borderRadius:10,background:"#1a2744",border:"1px solid #3b82f633",color:"#3b82f6",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                👥 Ver en Sabor
              </button>
              {onAddRestaurant&&<button onClick={()=>{onAddRestaurant({_mapPrefill:true,id:Date.now(),name:selectedGoogle.name,lat:selectedGoogle.lat,lng:selectedGoogle.lng,place_id:selectedGoogle.id,primaryType:selectedGoogle.primaryType,neighborhood:"",cuisine:"",rating:0,emoji:"🍽️",notes:"",photo:null,date:new Date().toISOString().split("T")[0]});setSelectedGoogle(null);}} style={{flex:1,padding:"9px",borderRadius:10,background:"#f97316",border:"none",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                ＋ Bitácora
              </button>}
            </div>
          </div>
        )}

        {/* Modal de comunidad Sabor para lugar de Google */}
        {googleModalOpen&&selectedGoogle&&(
          <GooglePlaceModal
            place={selectedGoogle}
            onClose={()=>setGoogleModalOpen(false)}
            onAddRestaurant={onAddRestaurant}
          />
        )}
      </div>
    );
  }

  // ── Friend Search Modal ─────────────────────────────────────────────────────
  function FriendSearchModal({user,onClose}){
    const[query,setQuery]=useState("");
    const[results,setResults]=useState([]);
    const[loading,setLoading]=useState(false);
    const[statuses,setStatuses]=useState({});
    const debRef=useRef(null);
    const inp={width:"100%",background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:"10px",padding:"10px 12px",color:"#fff",fontSize:"14px",outline:"none",boxSizing:"border-box"};
    useEffect(()=>{const h=e=>{if(e.key==="Escape")onClose();};document.addEventListener("keydown",h);return()=>document.removeEventListener("keydown",h);},[]);

    useEffect(()=>{
      if(!user)return;
      (async()=>{
        const{data}=await sb.from("friendships").select("requester_id,addressee_id,status")
          .or(`requester_id.eq.${user.id},addressee_id.eq.${user.id}`);
        const m={};
        (data||[]).forEach(f=>{const otherId=f.requester_id===user.id?f.addressee_id:f.requester_id;m[otherId]=f.status;});
        setStatuses(m);
      })();
    },[user]);

    const doSearch=async(q)=>{
      if(!q||q.trim().length<2){setResults([]);return;}
      setLoading(true);
      const clean=q.replace(/^@/,"");
      const{data}=await sb.from("profiles").select("id,username,name,avatar_url")
        .or(`username.ilike.%${clean}%,name.ilike.%${clean}%`).neq("id",user.id).limit(15);
      setResults(data||[]);
      setLoading(false);
    };

    useEffect(()=>{
      clearTimeout(debRef.current);
      debRef.current=setTimeout(()=>doSearch(query),320);
      return()=>clearTimeout(debRef.current);
    },[query]);

    const[addErr,setAddErr]=useState(null);
    const addFriend=async(targetId)=>{
      const{error}=await sb.from("friendships").insert({requester_id:user.id,addressee_id:targetId,status:"pending"});
      if(error){setAddErr("No se pudo enviar la solicitud");setTimeout(()=>setAddErr(null),3000);}
      else setStatuses(s=>({...s,[targetId]:"pending"}));
    };

    return(
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",flexDirection:"column",justifyContent:"flex-end",zIndex:9999,backdropFilter:"blur(6px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div className="slide-up" style={{background:"#111",borderRadius:"24px 24px 0 0",maxHeight:"80%",display:"flex",flexDirection:"column",border:"1px solid #222",borderBottom:"none"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 20px 0",flexShrink:0}}>
            <button onClick={onClose} style={{background:"none",border:"none",color:"#777",fontSize:"15px",cursor:"pointer"}}>Cerrar</button>
            <h2 style={{margin:0,fontSize:"16px",fontWeight:700,color:"#fff"}}>Buscar amigos</h2>
            <div style={{width:52}}/>
          </div>
          <div style={{display:"flex",justifyContent:"center",padding:"10px 0 0"}}><div style={{width:36,height:4,borderRadius:2,background:"#2a2a2a"}}/></div>
          <div style={{padding:"14px 20px 0",flexShrink:0}}>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#f97316",fontWeight:700,fontSize:15}}>@</span>
              <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Buscar por @usuario o nombre…" style={{...inp,paddingLeft:28}} autoFocus/>
              {loading&&<span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",color:"#f97316",fontSize:13}}>⏳</span>}
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"12px 20px 44px"}}>
            {addErr&&<div style={{background:"#ef444422",border:"1px solid #ef4444",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#ef4444",marginBottom:10}}>{addErr}</div>}
            {query.length>=2&&!loading&&results.length===0&&(
              <div style={{textAlign:"center",padding:"32px 0",color:"#444"}}>
                <div style={{fontSize:32,marginBottom:8}}>🔍</div>
                <p style={{fontSize:13}}>Sin resultados para "{query}"</p>
              </div>
            )}
            {query.length<2&&<p style={{fontSize:12,color:"#333",textAlign:"center",padding:"24px 0"}}>Escribe al menos 2 caracteres</p>}
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {results.map(p=>{
                const status=statuses[p.id];
                return(
                  <div key={p.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid #1a1a1a"}}>
                    <div style={{width:42,height:42,borderRadius:"50%",background:"linear-gradient(135deg,#f97316,#fbbf24)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0,overflow:"hidden"}}>
                      {p.avatar_url?<img src={p.avatar_url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:"👤"}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{margin:0,fontSize:14,fontWeight:700,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</p>
                      <p style={{margin:"2px 0 0",fontSize:12,color:"#f97316"}}>@{p.username}</p>
                    </div>
                    {!status&&<button onClick={()=>addFriend(p.id)} style={{padding:"7px 14px",borderRadius:20,background:"#f97316",border:"none",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0}}>Agregar</button>}
                    {status==="pending"&&<span style={{fontSize:11,color:"#888",padding:"7px 12px",borderRadius:20,background:"#1a1a1a",border:"1px solid #2a2a2a",flexShrink:0}}>Pendiente</span>}
                    {status==="accepted"&&<span style={{fontSize:11,color:"#10b981",padding:"7px 12px",borderRadius:20,background:"#10b98118",border:"1px solid #10b98133",flexShrink:0}}>✓ Amigos</span>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── Friend Profile Modal ────────────────────────────────────────────────────
  function FriendProfileModal({friendId,user,myRestaurants,onClose}){
    const[friendProfile,setFriendProfile]=useState(null);
    const[friendRestaurants,setFriendRestaurants]=useState([]);
    const[loading,setLoading]=useState(true);
    const[matchData,setMatchData]=useState(null);
    useEffect(()=>{const h=e=>{if(e.key==="Escape")onClose();};document.addEventListener("keydown",h);return()=>document.removeEventListener("keydown",h);},[]);

    useEffect(()=>{
      if(!friendId)return;
      let cancelled=false;
      (async()=>{
        setLoading(true);
        const[profRes,restRes]=await Promise.all([
          sb.from("profiles").select("id,username,name,bio,avatar_url").eq("id",friendId).single(),
          sb.from("restaurants").select("id,name,rating,emoji,cover_photo,neighborhood,cuisine,place_id,visited_at,created_at,notes").eq("user_id",friendId).eq("is_public",true).order("created_at",{ascending:false})
        ]);
        if(cancelled)return;
        setFriendProfile(profRes.data);
        const fRests=(restRes.data||[]).map(r=>({...r,photo:r.cover_photo,date:r.visited_at||r.created_at?.split("T")[0]}));
        setFriendRestaurants(fRests);
        setMatchData(calcMatchScore(myRestaurants,fRests));
        setLoading(false);
      })();
      return()=>{cancelled=true;};
    },[friendId]);

    const fp=friendProfile;
    const fRests=friendRestaurants;
    const rated=fRests.filter(r=>r.rating>0);
    const avgRating=rated.length?(rated.reduce((s,r)=>s+r.rating,0)/rated.length).toFixed(1):null;
    const nc=fRests.reduce((a,r)=>({...a,[r.neighborhood]:(a[r.neighborhood]||0)+1}),{});
    const topN=Object.entries(nc).sort((a,b)=>b[1]-a[1])[0];

    return(
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",flexDirection:"column",justifyContent:"flex-end",zIndex:9999,backdropFilter:"blur(8px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div className="slide-up" style={{background:"#111",borderRadius:"24px 24px 0 0",maxHeight:"92%",display:"flex",flexDirection:"column",border:"1px solid #222",borderBottom:"none"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 20px 0",flexShrink:0}}>
            <button onClick={onClose} style={{background:"none",border:"none",color:"#777",fontSize:"15px",cursor:"pointer"}}>Cerrar</button>
            <h2 style={{margin:0,fontSize:"16px",fontWeight:700,color:"#fff"}}>Perfil</h2>
            <div style={{width:42}}/>
          </div>
          <div style={{display:"flex",justifyContent:"center",padding:"10px 0 0"}}><div style={{width:36,height:4,borderRadius:2,background:"#2a2a2a"}}/></div>
          <div style={{flex:1,overflowY:"auto",padding:"16px 20px 44px"}}>
            {loading?(
              <div style={{textAlign:"center",padding:"60px 0"}}>
                <div style={{fontSize:40,marginBottom:12}}>👤</div>
                <p style={{fontSize:13,color:"#555"}}>Cargando perfil…</p>
              </div>
            ):fp?(
              <>
                {/* Header */}
                <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
                  <div style={{width:64,height:64,borderRadius:"50%",background:"linear-gradient(135deg,#f97316,#fbbf24)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0,overflow:"hidden",border:"2px solid #2a2a2a"}}>
                    {fp.avatar_url?<img src={fp.avatar_url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:"👤"}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <h2 style={{margin:0,fontSize:20,fontWeight:800,color:"#fff"}}>{fp.name}</h2>
                    <p style={{margin:"2px 0 0",fontSize:13,color:"#f97316"}}>@{fp.username}</p>
                    {fp.bio&&<p style={{margin:"4px 0 0",fontSize:12,color:"#666",lineHeight:1.4}}>{fp.bio}</p>}
                  </div>
                </div>

                {/* Match Score */}
                {matchData&&matchData.score!==null?(
                  <div style={{marginBottom:16}}>
                    <MatchBadge score={matchData.score} confidence={matchData.confidence} size="large"/>
                  </div>
                ):(
                  <div style={{marginBottom:16,padding:"16px",background:"#1a1a1a",borderRadius:14,border:"1px solid #222",textAlign:"center"}}>
                    <span style={{fontSize:24}}>🤷</span>
                    <p style={{margin:"8px 0 0",fontSize:13,color:"#555",lineHeight:1.5}}>Sin datos aún — visiten más lugares juntos</p>
                  </div>
                )}

                {/* Stats */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:1,background:"#222",borderRadius:14,overflow:"hidden",marginBottom:16}}>
                  <div style={{background:"#1a1a1a",padding:"14px 0",textAlign:"center"}}>
                    <div style={{fontSize:20,fontWeight:800,color:"#fff"}}>{fRests.length}</div>
                    <div style={{fontSize:9,color:"#555",marginTop:2,letterSpacing:"0.05em"}}>LUGARES</div>
                  </div>
                  <div style={{background:"#1a1a1a",padding:"14px 0",textAlign:"center"}}>
                    <div style={{fontSize:20,fontWeight:800,color:"#fbbf24"}}>{avgRating||"—"}</div>
                    <div style={{fontSize:9,color:"#555",marginTop:2,letterSpacing:"0.05em"}}>PROMEDIO</div>
                  </div>
                  <div style={{background:"#1a1a1a",padding:"14px 0",textAlign:"center"}}>
                    <div style={{fontSize:14,fontWeight:800,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"0 4px"}}>{topN?topN[0]:"—"}</div>
                    <div style={{fontSize:9,color:"#555",marginTop:2,letterSpacing:"0.05em"}}>BARRIO FAV</div>
                  </div>
                </div>

                {/* Shared Restaurants */}
                {matchData&&matchData.common.length>0&&(
                  <div style={{marginBottom:16}}>
                    <p style={{fontSize:10,fontWeight:700,color:"#444",letterSpacing:"0.1em",marginBottom:10}}>LUGARES QUE CONOCEN LOS DOS · {matchData.common.length}</p>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {matchData.common.map((c,i)=>(
                        <div key={i} style={{background:"#1a1a1a",borderRadius:12,padding:"12px 14px",border:"1px solid #222"}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                            <span style={{fontSize:18}}>{c.mine.emoji||"🍽️"}</span>
                            <div style={{flex:1,minWidth:0}}>
                              <p style={{margin:0,fontSize:13,fontWeight:700,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.mine.name}</p>
                              <p style={{margin:"1px 0 0",fontSize:10,color:"#555"}}>{c.mine.neighborhood}</p>
                            </div>
                            {c.diff>0&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:"999px",background:c.diff>=2?"#ef444418":"#fbbf2418",color:c.diff>=2?"#ef4444":"#fbbf24",border:`1px solid ${c.diff>=2?"#ef444433":"#fbbf2433"}`,fontWeight:700}}>Δ{c.diff}</span>}
                          </div>
                          <div style={{display:"flex",gap:8}}>
                            <div style={{flex:1,padding:"8px 10px",borderRadius:8,background:"#0f0f0f",border:"1px solid #1e1e1e",textAlign:"center"}}>
                              <p style={{margin:0,fontSize:9,color:"#555",letterSpacing:"0.05em"}}>TÚ</p>
                              <div style={{marginTop:3}}><Stars rating={c.mine.rating} size={12}/></div>
                            </div>
                            <div style={{flex:1,padding:"8px 10px",borderRadius:8,background:"#0f0f0f",border:"1px solid #1e1e1e",textAlign:"center"}}>
                              <p style={{margin:0,fontSize:9,color:"#555",letterSpacing:"0.05em"}}>@{fp.username.toUpperCase()}</p>
                              <div style={{marginTop:3}}><Stars rating={c.theirs.rating} size={12}/></div>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                {/* Their public restaurants */}
                <div>
                  <p style={{fontSize:10,fontWeight:700,color:"#444",letterSpacing:"0.1em",marginBottom:10}}>SUS HALLAZGOS · {fRests.length}</p>
                  {fRests.length===0?(
                    <div style={{textAlign:"center",padding:"24px",background:"#1a1a1a",borderRadius:12,border:"1px dashed #2a2a2a"}}>
                      <p style={{fontSize:13,color:"#444"}}>Aún no comparte sus hallazgos</p>
                    </div>
                  ):(
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      {fRests.map(r=>{
                        const cc=CUISINE_COLORS[r.cuisine]||"#f97316";
                        return(
                          <div key={r.id} style={{background:"#1a1a1a",borderRadius:12,border:"1px solid #222",overflow:"hidden"}}>
                            {r.photo?(
                              <div style={{height:70,overflow:"hidden",position:"relative"}}>
                                <img src={r.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                                <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.7) 100%)"}}/>
                              </div>
                            ):(
                              <div style={{height:50,background:`linear-gradient(135deg,${cc}15,${cc}08)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>{r.emoji}</div>
                            )}
                            <div style={{padding:"8px 10px"}}>
                              <p style={{margin:0,fontSize:12,fontWeight:700,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</p>
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:4}}>
                                <Stars rating={r.rating} size={10}/>
                                <span style={{fontSize:9,color:"#555"}}>{r.neighborhood}</span>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </>
            ):(
              <div style={{textAlign:"center",padding:"60px 0"}}>
                <p style={{fontSize:13,color:"#555"}}>No se pudo cargar el perfil</p>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ── Profile Screen ─────────────────────────────────────────────────────────
  function ProfileScreen({restaurants,profile,user}){
    const[showFriendSearch,setShowFriendSearch]=useState(false);
    const[friends,setFriends]=useState([]);
    const[pendingRequests,setPendingRequests]=useState([]);
    const[loadingFriends,setLoadingFriends]=useState(false);
    const[avatarUrl,setAvatarUrl]=useState(()=>{try{return localStorage.getItem("sabor_v4_avatar")||null;}catch{return null;}});
    const[selectedFriendId,setSelectedFriendId]=useState(null);
    const[friendScores,setFriendScores]=useState({});
    const avatarRef=useRef();
    const handleAvatarChange=async(e)=>{const f=e.target.files[0];if(!f)return;const url=await resizeImage(f,400,0.85);setAvatarUrl(url);try{localStorage.setItem("sabor_v4_avatar",url);}catch{}};

    const total=restaurants.filter(r=>r.rating>0).length;
    const avg=total>0?(restaurants.reduce((s,r)=>s+r.rating,0)/total).toFixed(1):null;
    const cc=restaurants.reduce((a,r)=>({...a,[r.cuisine]:(a[r.cuisine]||0)+1}),{});
    const topC=Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,3);
    const nc=restaurants.reduce((a,r)=>({...a,[r.neighborhood]:(a[r.neighborhood]||0)+1}),{});
    const topN=Object.entries(nc).sort((a,b)=>b[1]-a[1])[0];
    const dist=[5,4,3,2,1].map(s=>({s,c:restaurants.filter(r=>r.rating===s).length}));
    const rCount=restaurants.length;
    const level=rCount<=5?{icon:"🌱",name:"Curioso"}:rCount<=15?{icon:"🧭",name:"Explorador"}:rCount<=30?{icon:"🍽️",name:"Conocedor"}:{icon:"🔍",name:"Investigador"};
    const card={background:"#1a1a1a",borderRadius:16,padding:16,border:"1px solid #222"};
    const clbl={margin:"0 0 2px",fontSize:"10px",fontWeight:700,color:"#444",letterSpacing:"0.1em"};

    useEffect(()=>{if(user)loadSocialData();},[user]);

    const loadSocialData=async()=>{
      setLoadingFriends(true);
      const{data:friendships,error:fErr}=await sb.from("friendships")
        .select("id,requester_id,addressee_id,status")
        .or(`requester_id.eq.${user.id},addressee_id.eq.${user.id}`)
        .in("status",["accepted","pending"]);
      if(fErr){setLoadingFriends(false);return;}
      const accepted=(friendships||[]).filter(f=>f.status==="accepted");
      const pendingIn=(friendships||[]).filter(f=>f.status==="pending"&&f.addressee_id===user.id);
      const friendIds=accepted.map(f=>f.requester_id===user.id?f.addressee_id:f.requester_id);
      const pendingIds=pendingIn.map(f=>f.requester_id);
      const allIds=[...new Set([...friendIds,...pendingIds])];
      if(allIds.length>0){
        const{data:profiles,error:pErr}=await sb.from("profiles").select("id,username,name,avatar_url").in("id",allIds);
        if(pErr){setLoadingFriends(false);return;}
        const pm={};(profiles||[]).forEach(p=>{pm[p.id]=p;});
        setFriends(friendIds.map(id=>pm[id]).filter(Boolean));
        setPendingRequests(pendingIn.map(f=>({...f,profile:pm[f.requester_id]})).filter(f=>f.profile));
      } else {setFriends([]);setPendingRequests([]);}
      setLoadingFriends(false);
    };

    const acceptRequest=async(fid)=>{const{error}=await sb.from("friendships").update({status:"accepted"}).eq("id",fid);if(!error)loadSocialData();};
    const rejectRequest=async(fid)=>{const{error}=await sb.from("friendships").update({status:"blocked"}).eq("id",fid);if(!error)loadSocialData();};

    // Load match scores for all friends
    useEffect(()=>{
      if(!friends.length||!user)return;
      let cancelled=false;
      const loadScores=async()=>{
        const ids=friends.map(f=>f.id);
        const{data}=await sb.from("restaurants").select("id,name,rating,neighborhood,place_id,user_id").eq("is_public",true).in("user_id",ids);
        if(!data||cancelled)return;
        const byUser={};
        data.forEach(r=>{if(!byUser[r.user_id])byUser[r.user_id]=[];byUser[r.user_id].push(r);});
        const scores={};
        ids.forEach(id=>{
          const fr=byUser[id]||[];
          const result=calcMatchScore(restaurants,fr);
          if(result.score!==null)scores[id]=result.score;
        });
        if(!cancelled)setFriendScores(scores);
      };
      loadScores();
      return()=>{cancelled=true;};
    },[friends,restaurants]);

    return(
      <div style={{overflowY:"auto",height:"100%",padding:"20px 20px 100px"}}>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
          <div style={{position:"relative",flexShrink:0,cursor:"pointer"}} onClick={()=>avatarRef.current.click()}>
            {avatarUrl?(<img src={avatarUrl} style={{width:72,height:72,borderRadius:"50%",objectFit:"cover",border:"2px solid #f97316"}}/>):(<div style={{width:72,height:72,borderRadius:"50%",background:"linear-gradient(135deg,#f97316,#fbbf24)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>👤</div>)}
            <div style={{position:"absolute",bottom:0,right:0,width:22,height:22,borderRadius:"50%",background:"#f97316",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,border:"2px solid #0f0f0f",pointerEvents:"none"}}>📷</div>
            <input ref={avatarRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleAvatarChange}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <h2 style={{margin:0,fontSize:"20px",fontWeight:800,color:"#fff"}}>{profile?.name||"Usuario"}</h2>
            <p style={{margin:"2px 0 0",fontSize:13,color:"#f97316"}}>{profile?.handle||"@usuario"}</p>
            {profile?.bio&&<p style={{margin:"4px 0 0",fontSize:12,color:"#666",lineHeight:1.4,overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{profile.bio}</p>}
          </div>
        </div>

        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:1,background:"#222",borderRadius:16,overflow:"hidden",marginBottom:14}}>
          {[{l:"Hallazgos",v:rCount},{l:"Amigos",v:friends.length}].map(s=>(
            <div key={s.l} style={{background:"#1a1a1a",padding:"16px 0",textAlign:"center"}}>
              <div style={{fontSize:24,fontWeight:800,color:"#fff"}}>{s.v}</div>
              <div style={{fontSize:11,color:"#555",marginTop:2,letterSpacing:"0.05em"}}>{s.l.toUpperCase()}</div>
            </div>
          ))}
        </div>

        {/* Buscar amigos CTA */}
        {user&&(
          <button onClick={()=>setShowFriendSearch(true)} style={{width:"100%",padding:"12px",borderRadius:12,background:"#1a1a1a",border:"1.5px solid #f97316",color:"#f97316",fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}
            onMouseEnter={e=>e.currentTarget.style.background="#f9731618"}
            onMouseLeave={e=>e.currentTarget.style.background="#1a1a1a"}>
            🔍 Buscar amigos
          </button>
        )}

        {/* Solicitudes pendientes */}
        {pendingRequests.length>0&&(
          <div style={{...card,marginBottom:14,border:"1px solid #f9731633",background:"#f9731608"}}>
            <p style={{...clbl,color:"#f97316",marginBottom:10}}>SOLICITUDES PENDIENTES · {pendingRequests.length}</p>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {pendingRequests.map(req=>(
                <div key={req.id} style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:38,height:38,borderRadius:"50%",background:"linear-gradient(135deg,#f97316,#fbbf24)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0,overflow:"hidden"}}>
                    {req.profile?.avatar_url?<img src={req.profile.avatar_url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:"👤"}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{margin:0,fontSize:13,fontWeight:700,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{req.profile.name}</p>
                    <p style={{margin:0,fontSize:11,color:"#f97316"}}>@{req.profile.username}</p>
                  </div>
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    <button onClick={()=>acceptRequest(req.id)} style={{padding:"6px 14px",borderRadius:8,background:"#f97316",border:"none",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>✓ Aceptar</button>
                    <button onClick={()=>rejectRequest(req.id)} style={{padding:"6px 10px",borderRadius:8,background:"#1a1a1a",border:"1px solid #333",color:"#555",fontSize:12,cursor:"pointer"}}>✕</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Lista de amigos */}
        {user&&!loadingFriends&&friends.length===0&&(
          <div style={{...card,marginBottom:14,textAlign:"center",padding:"20px 16px"}}>
            <p style={clbl}>MIS AMIGOS</p>
            <div style={{fontSize:36,marginBottom:8}}>👥</div>
            <p style={{fontSize:13,color:"#555",lineHeight:1.6,margin:"0 0 12px"}}>Aún no tienes amigos en Sabor.<br/>Busca a tus compañeros gastronómicos.</p>
            <button onClick={()=>setShowFriendSearch(true)} style={{padding:"10px 20px",borderRadius:12,background:"#f97316",border:"none",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Buscar amigos</button>
          </div>
        )}
        {(friends.length>0||loadingFriends)&&(
          <div style={{...card,marginBottom:14}}>
            <p style={clbl}>MIS AMIGOS · {friends.length}</p>
            {loadingFriends?<p style={{fontSize:12,color:"#555",marginTop:8}}>Cargando…</p>:(
              <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:4,marginTop:10,scrollbarWidth:"none"}}>
                {friends.map(f=>(
                  <div key={f.id} onClick={()=>setSelectedFriendId(f.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,flexShrink:0,cursor:"pointer"}}>
                    <div style={{position:"relative"}}>
                      <div style={{width:48,height:48,borderRadius:"50%",background:"linear-gradient(135deg,#f97316,#fbbf24)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,overflow:"hidden",border:"2px solid #2a2a2a"}}>
                        {f.avatar_url?<img src={f.avatar_url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:"👤"}
                      </div>
                      {friendScores[f.id]!=null&&(
                        <div style={{position:"absolute",bottom:-2,right:-4,fontSize:8,fontWeight:800,padding:"1px 5px",borderRadius:"999px",background:friendScores[f.id]>85?"#f97316":friendScores[f.id]>70?"#ef4444":friendScores[f.id]>55?"#fbbf24":"#666",color:"#fff",border:"2px solid #111",lineHeight:1.4}}>{friendScores[f.id]}%</div>
                      )}
                    </div>
                    <p style={{margin:0,fontSize:10,color:"#888",maxWidth:52,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",textAlign:"center"}}>@{f.username}</p>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={card}>
            <p style={clbl}>NIVEL EXPLORADOR</p>
            <div style={{display:"flex",alignItems:"center",gap:12,marginTop:8}}>
              <span style={{fontSize:34,lineHeight:1}}>{level.icon}</span>
              <div style={{flex:1}}><p style={{margin:0,fontSize:18,fontWeight:800,color:"#fff"}}>{level.name}</p><p style={{margin:"3px 0 0",fontSize:11,color:"#555"}}>{rCount} hallazgo{rCount!==1?"s":""} registrado{rCount!==1?"s":""}</p></div>
              <span style={{fontSize:11,fontWeight:700,padding:"4px 12px",borderRadius:"999px",background:"#f9731622",color:"#f97316",border:"1px solid #f9731633",whiteSpace:"nowrap"}}>{level.name}</span>
            </div>
          </div>
          {topC.length>0&&(<div style={card}><p style={clbl}>MI ESTILO GASTRONÓMICO</p><div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:10}}>{topC.map(([c])=>(<span key={c} style={{fontSize:"12px",fontWeight:700,padding:"5px 14px",borderRadius:"999px",background:(CUISINE_COLORS[c]||"#f97316")+"22",color:CUISINE_COLORS[c]||"#f97316",border:`1px solid ${(CUISINE_COLORS[c]||"#f97316")}44`}}>{c}</span>))}</div></div>)}
          {avg&&(<div style={card}><p style={clbl}>CALIFICACIÓN PROMEDIO</p><div style={{display:"flex",alignItems:"center",gap:10,marginTop:6}}><span style={{fontSize:36,fontWeight:800,color:"#fbbf24"}}>{avg}</span><Stars rating={Math.round(parseFloat(avg))} size={18}/></div></div>)}
          {topC.length>0&&(<div style={card}><p style={clbl}>COCINAS FAVORITAS</p><div style={{display:"flex",flexDirection:"column",gap:8,marginTop:8}}>{topC.map(([c,n])=>(<div key={c} style={{display:"flex",alignItems:"center",gap:10}}><div style={{flex:1,height:6,borderRadius:3,background:"#222",overflow:"hidden"}}><div style={{height:"100%",width:`${(n/rCount)*100}%`,background:CUISINE_COLORS[c]||"#f97316",borderRadius:3}}/></div><span style={{fontSize:12,color:"#aaa",minWidth:92,textAlign:"right"}}>{c.length>14?c.slice(0,14)+"…":c}</span><span style={{fontSize:12,color:"#555",minWidth:16,textAlign:"right"}}>{n}</span></div>))}</div></div>)}
          {total>0&&(<div style={card}><p style={clbl}>DISTRIBUCIÓN DE ESTRELLAS</p><div style={{display:"flex",flexDirection:"column",gap:6,marginTop:8}}>{dist.map(({s,c})=>(<div key={s} style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:11,color:"#fbbf24",minWidth:60}}>{"★".repeat(s)}</span><div style={{flex:1,height:5,borderRadius:3,background:"#222",overflow:"hidden"}}><div style={{height:"100%",width:total?`${(c/total)*100}%`:"0%",background:"#fbbf24",opacity:0.4+s*0.12,borderRadius:3}}/></div><span style={{fontSize:11,color:"#444",minWidth:20,textAlign:"right"}}>{c}</span></div>))}</div></div>)}
          {topN&&(<div style={card}><p style={clbl}>DISTRITO FAVORITO</p><div style={{display:"flex",alignItems:"center",gap:10,marginTop:4}}><span style={{fontSize:28}}>📍</span><div><p style={{margin:0,fontSize:20,fontWeight:800,color:"#fff"}}>{topN[0]}</p><p style={{margin:"2px 0 0",fontSize:12,color:"#555"}}>{topN[1]} {topN[1]===1?"expedición":"expediciones"}</p></div></div></div>)}
        </div>

        {showFriendSearch&&user&&<FriendSearchModal user={user} onClose={()=>{setShowFriendSearch(false);loadSocialData();}}/>}
        {selectedFriendId&&user&&<FriendProfileModal friendId={selectedFriendId} user={user} myRestaurants={restaurants} onClose={()=>setSelectedFriendId(null)}/>}
      </div>
    );
  }

  // ── Onboarding ─────────────────────────────────────────────────────────────
  function Onboarding({onComplete}){
    const[step,setStep]=useState(0);
    const[authMode,setAuthMode]=useState("signup");
    const[profile,setProfile]=useState({name:"",handle:"",bio:"",email:"",password:""});
    const[err,setErr]=useState("");
    const[authLoading,setAuthLoading]=useState(false);
    const sp=(k,v)=>setProfile(p=>({...p,[k]:v}));

    const finish=async()=>{
      setErr("");
      if(authMode==="login"){
        if(!profile.email.trim()){setErr("Ingresa tu email.");return;}
        if(!profile.password){setErr("Ingresa tu contraseña.");return;}
        setAuthLoading(true);
        const{data,error}=await sb.auth.signInWithPassword({email:profile.email.trim(),password:profile.password});
        setAuthLoading(false);
        if(error){setErr(error.message==="Invalid login credentials"?"Email o contraseña incorrectos.":error.message);return;}
        onComplete(data.user,null);
      } else {
        if(!profile.name.trim()){setErr("¿Cuál es tu nombre?");return;}
        if(!profile.handle.trim()){setErr("Elige un nombre de usuario.");return;}
        const cleanHandle=profile.handle.replace(/^@/,"");
        if(cleanHandle.length<3){setErr("El usuario debe tener al menos 3 caracteres.");return;}
        if(!/^[a-zA-Z0-9_]+$/.test(cleanHandle)){setErr("Solo letras, números y guión bajo (_) en el usuario.");return;}
        if(!profile.email.trim()){setErr("Ingresa tu email.");return;}
        if(!profile.password||profile.password.length<6){setErr("La contraseña debe tener al menos 6 caracteres.");return;}
        setAuthLoading(true);
        const{data,error}=await sb.auth.signUp({email:profile.email.trim(),password:profile.password});
        setAuthLoading(false);
        if(error){setErr(error.message);return;}
        if(!data.session){
          // Email confirmation required
          setErr("✉️ Revisa tu email para confirmar tu cuenta, luego inicia sesión aquí.");
          setAuthMode("login");
          return;
        }
        onComplete(data.user,{name:profile.name,handle:profile.handle.startsWith("@")?profile.handle:"@"+profile.handle,bio:profile.bio});
      }
    };

    const inp={width:"100%",background:"#111",border:"1px solid #2a2a2a",borderRadius:12,padding:"12px 14px",color:"#fff",fontSize:15,outline:"none",boxSizing:"border-box"};
    const lbl={display:"block",fontSize:"10px",fontWeight:700,color:"#555",letterSpacing:"0.1em",marginBottom:8};
    const Dots=()=>(<div style={{display:"flex",gap:6,justifyContent:"center",marginTop:20}}>{[0,1,2].map(i=>(<div key={i} style={{width:i===step?20:6,height:6,borderRadius:3,background:i===step?"#f97316":"#2a2a2a",transition:"all 0.3s ease"}}/>))}</div>);

    if(step===0)return(
      <div style={{height:"100%",background:"#0a0a0a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"space-between",padding:"0 36px 52px",textAlign:"center",position:"relative"}}>
        {/* Ambient glow muy sutil */}
        <div style={{position:"absolute",top:"22%",left:"50%",transform:"translateX(-50%)",width:320,height:320,borderRadius:"50%",background:"radial-gradient(circle,rgba(249,115,22,0.05) 0%,transparent 68%)",pointerEvents:"none"}}/>
        {/* Hero */}
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:0}}>
          <div className="fade-up">
            <h1 style={{fontSize:80,fontWeight:900,color:"#fff",letterSpacing:"-4px",lineHeight:0.9,margin:0}}>sabor<span style={{color:"#f97316"}}>.</span></h1>
          </div>
          <div className="fade-up-2" style={{marginTop:14}}>
            <p style={{fontSize:10,fontWeight:700,color:"rgba(249,115,22,0.55)",letterSpacing:"0.32em",margin:0}}>BITÁCORA</p>
          </div>
          <div className="fade-up-3" style={{marginTop:28}}>
            <p style={{fontSize:12,color:"#2e2e2e",lineHeight:1.75,maxWidth:230,margin:0,fontStyle:"italic"}}>Del lat. <em style={{color:"#3a3a3a"}}>bittaculum</em> — cuaderno del explorador en travesía.</p>
          </div>
          <div className="fade-up-3" style={{marginTop:36}}>
            <p style={{fontSize:17,color:"#666",lineHeight:1.5,maxWidth:260,margin:0,fontWeight:400}}>Lima tiene sabor.<br/><span style={{color:"#c0c0c0",fontWeight:500}}>Empieza a registrarlo.</span></p>
          </div>
        </div>
        {/* CTA minimalista */}
        <div className="fade-up-4" style={{width:"100%"}}>
          <button
            onClick={()=>setStep(1)}
            style={{width:"100%",padding:"15px",borderRadius:14,background:"transparent",border:"1px solid #282828",color:"#888",fontSize:15,fontWeight:500,cursor:"pointer",letterSpacing:"0.02em",transition:"all 0.2s ease"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor="#f97316";e.currentTarget.style.color="#fff";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="#282828";e.currentTarget.style.color="#888";}}>
            Comenzar →
          </button>
          <Dots/>
        </div>
      </div>
    );
    if(step===1){
      const features=[{icon:"📖",color:"#f97316",title:"Registra cada hallazgo",desc:"Anota cada restaurante que visitas — calificación, notas de campo y fotos."},{icon:"📸",color:"#ec4899",title:"Documenta cada plato",desc:"Dentro de cada restaurante, un feed de momentos: fotos de platos con tus comentarios."},{icon:"🗺️",color:"#3b82f6",title:"Cartografía tu Lima",desc:"Todos tus descubrimientos como pines en el mapa. Tu territorio a la vista."}];
      return(
        <div style={{height:"100%",background:"#0a0a0a",display:"flex",flexDirection:"column",padding:"48px 24px 50px"}}>
          <div className="fade-up" style={{textAlign:"center",marginBottom:32}}><p style={{fontSize:11,fontWeight:700,color:"#f97316",letterSpacing:"0.15em",marginBottom:10}}>TU KIT DE CAMPO</p><h2 style={{fontSize:26,fontWeight:800,color:"#fff",lineHeight:1.2}}>Las herramientas<br/>del investigador</h2></div>
          <div style={{flex:1,display:"flex",flexDirection:"column",gap:12}}>
            {features.map((f,i)=>(<div key={i} className="fade-up" style={{animationDelay:`${i*0.12}s`,background:"#141414",borderRadius:16,padding:18,border:"1px solid #222",display:"flex",gap:14,alignItems:"flex-start"}}><div style={{width:48,height:48,borderRadius:14,background:f.color+"18",border:`1px solid ${f.color}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{f.icon}</div><div><p style={{fontSize:14,fontWeight:700,color:"#fff",marginBottom:4}}>{f.title}</p><p style={{fontSize:12,color:"#666",lineHeight:1.55}}>{f.desc}</p></div></div>))}
          </div>
          <div style={{marginTop:28}}><button onClick={()=>setStep(2)} style={{width:"100%",padding:16,borderRadius:14,background:"#f97316",border:"none",color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",boxShadow:"0 6px 24px rgba(249,115,22,0.4)"}}>Siguiente →</button><Dots/></div>
        </div>
      );
    }
    return(
      <div style={{height:"100%",background:"#0a0a0a",display:"flex",flexDirection:"column",padding:"48px 24px 50px",overflowY:"auto"}}>
        <div className="fade-up" style={{textAlign:"center",marginBottom:authMode==="login"?24:16}}>

    const[hasFriends,setHasFriends]=useState(null);
    const[feedScores,setFeedScores]=useState({});

    const feedCancelRef=useRef(false);
    useEffect(()=>{feedCancelRef.current=false;if(!user){setLoading(false);return;}loadFeed();return()=>{feedCancelRef.current=true;};},[user]);
    useEffect(()=>{
      if(!posts.length)return;
      let c=false;
      (async()=>{
        const ids=posts.map(p=>p.id);
        const{data}=await sb.from("comments").select("restaurant_id").in("restaurant_id",ids);
        if(c)return;
        const counts={};(data||[]).forEach(r=>{counts[r.restaurant_id]=(counts[r.restaurant_id]||0)+1;});
        setCommentCounts(counts);
      })();
      return()=>{c=true;};
    },[posts]);

    const loadFeed=async()=>{
      setLoading(true);
      const{data:friendships,error:fErr}=await sb.from("friendships")
        .select("requester_id,addressee_id")
        .or(`requester_id.eq.${user.id},addressee_id.eq.${user.id}`)
        .eq("status","accepted");
      if(fErr||feedCancelRef.current){setLoading(false);return;}
      const friendIds=(friendships||[]).map(f=>f.requester_id===user.id?f.addressee_id:f.requester_id);
      if(friendIds.length===0){setHasFriends(false);setLoading(false);return;}
      setHasFriends(true);
      const{data,error:rErr}=await sb.from("restaurants")
        .select("id,name,rating,emoji,cover_photo,neighborhood,cuisine,visited_at,created_at,notes,user_id")
        .eq("is_public",true).in("user_id",friendIds)
        .order("created_at",{ascending:false}).limit(50);
      if(rErr||feedCancelRef.current){setLoading(false);return;}
      if(data&&data.length>0){

        const{data:profiles}=await sb.from("profiles").select("id,username,name,avatar_url").in("id",uids);

        const byUser={};data.forEach(r=>{if(!byUser[r.user_id])byUser[r.user_id]=[];byUser[r.user_id].push(r);});
        const scores={};
        Object.keys(byUser).forEach(uid=>{const result=calcMatchScore(myRestaurants||[],byUser[uid]);if(result.score!==null)scores[uid]=result.score;});

  // ── App ────────────────────────────────────────────────────────────────────
  // ── PWA Install Banner ────────────────────────────────────────────────────
  function PWAInstallBanner(){
    const[deferredPrompt,setDeferredPrompt]=useState(null);
    const[showBanner,setShowBanner]=useState(false);
    const[isIOS,setIsIOS]=useState(false);
    const[showIOSGuide,setShowIOSGuide]=useState(false);
    const[dismissed,setDismissed]=useState(()=>localStorage.getItem("sabor_pwa_installed")==="1");

    useEffect(()=>{
      if(dismissed)return;
      const ios=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
      const standalone=window.navigator.standalone||window.matchMedia("(display-mode: standalone)").matches;
      if(standalone){setDismissed(true);return;}
      setIsIOS(ios);
      if(ios){setTimeout(()=>setShowBanner(true),3000);return;}
      const handler=(e)=>{e.preventDefault();setDeferredPrompt(e);setShowBanner(true);};
      window.addEventListener("beforeinstallprompt",handler);
      return()=>window.removeEventListener("beforeinstallprompt",handler);
    },[dismissed]);

    const handleInstall=async()=>{
      if(isIOS){setShowIOSGuide(true);return;}
      if(!deferredPrompt)return;
      deferredPrompt.prompt();
      const{outcome}=await deferredPrompt.userChoice;
      if(outcome==="accepted"){localStorage.setItem("sabor_pwa_installed","1");setDismissed(true);}
      setDeferredPrompt(null);setShowBanner(false);
    };

    const dismiss=()=>{setShowBanner(false);setShowIOSGuide(false);localStorage.setItem("sabor_pwa_installed","1");setDismissed(true);};

    if(dismissed||!showBanner)return null;

    if(showIOSGuide)return(
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:10000,padding:"16px",animation:"slideInUp 0.35s ease both"}}>
        <div style={{background:"rgba(20,20,25,0.92)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderRadius:16,border:"1px solid rgba(255,255,255,0.08)",padding:"16px 18px",boxShadow:"0 -4px 30px rgba(0,0,0,0.5)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontSize:14,fontWeight:700,color:"#fff"}}>Instalar Sabor en iOS</span>
            <button onClick={dismiss} style={{background:"none",border:"none",color:"#666",fontSize:18,cursor:"pointer",padding:4}}>✕</button>
          </div>
          <div style={{fontSize:12,color:"#aaa",lineHeight:1.5}}>
            <p style={{marginBottom:6}}>1. Toca el botón <span style={{color:"#fff",fontWeight:600}}>Compartir</span> <span style={{fontSize:15}}>⎙</span> en Safari</p>
            <p>2. Selecciona <span style={{color:"#fff",fontWeight:600}}>"Añadir a pantalla de inicio"</span></p>
          </div>
        </div>
      </div>
    );

    return(
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:10000,padding:"16px",animation:"slideInUp 0.35s ease both"}}>
        <div style={{background:"rgba(20,20,25,0.92)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderRadius:16,border:"1px solid rgba(255,255,255,0.08)",padding:"12px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 -4px 30px rgba(0,0,0,0.5)"}}>
          <span style={{fontSize:24}}>📱</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,color:"#fff"}}>Instala Sabor en tu celular</div>
            <div style={{fontSize:11,color:"#888",marginTop:1}}>Acceso rápido sin abrir el navegador</div>
          </div>
          <button onClick={handleInstall} style={{background:"#ff6b35",color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>Instalar</button>
          <button onClick={dismiss} style={{background:"none",border:"none",color:"#555",fontSize:16,cursor:"pointer",padding:4,flexShrink:0}}>✕</button>
        </div>
      </div>
    );
  }

  function Sabor(){
    const[onboardingDone,setOnboardingDone]=useState(false);
    const[appLoading,setAppLoading]=useState(true);
    const[user,setUser]=useState(null);
    const[profile,setProfile]=useState(null);
    const[restaurants,setRestaurants]=useState([]);
    const[activeTab,setActiveTab]=useState("bitacora");
    const[modal,setModal]=useState(null);
    const[detailId,setDetailId]=useState(null);
    const[toast,setToast]=useState({visible:false,message:""});
    const toastTimer=useRef(null);
    const[eloCompareFor,setEloCompareFor]=useState(null);
    const[friendProfileId,setFriendProfileId]=useState(null);
    const[commentBadge,setCommentBadge]=useState(0);
    const showToast=(message,type)=>{clearTimeout(toastTimer.current);setToast({visible:true,message,type});toastTimer.current=setTimeout(()=>setToast(t=>({...t,visible:false})),type==="error"?3500:2000);};
    const[customLists,setCustomLists]=useState(()=>{try{const s=localStorage.getItem("sabor_lists");return s?JSON.parse(s):[];}catch{return[];}});
    useEffect(()=>{try{localStorage.setItem("sabor_lists",JSON.stringify(customLists));}catch{}},[customLists]);
    const allLists=[...DEFAULT_LISTS,...customLists];
    const handleCreateList=list=>{setCustomLists(p=>[...p,list]);};
    const handleDeleteList=listId=>{setCustomLists(p=>p.filter(l=>l.id!==listId));};
    const handleRenameList=(listId,newName)=>{setCustomLists(p=>p.map(l=>l.id===listId?{...l,name:newName}:l));};

    // ── helpers Supabase ──
    const loadProfile=async(userId)=>{
      const{data}=await sb.from("profiles").select("*").eq("id",userId).single();
      if(data) setProfile({name:data.name||"Usuario",handle:"@"+(data.username||"usuario"),bio:data.bio||""});
      else setProfile({name:"Usuario",handle:"@usuario",bio:""});
    };

    const loadRestaurants=async(userId)=>{
      const{data,error}=await sb.from("restaurants").select("*").eq("user_id",userId).order("created_at",{ascending:false});
      if(!error&&data&&data.length>0){
        const ld=getListsData();const ed=getEloData();
        setRestaurants(data.map(r=>({...r,photo:r.cover_photo,date:r.visited_at||r.created_at?.split("T")[0]||new Date().toISOString().split("T")[0],lists:r.lists||ld[String(r.id)]||getAutoLists(r),eloScore:ed[String(r.id)]?.eloScore??5.0,eloComparisons:ed[String(r.id)]?.eloComparisons??0})));
      } else {
        // fallback localStorage
        try{
          const v4=localStorage.getItem("sabor_v4_restaurants");
          if(v4){const p=JSON.parse(v4);if(Array.isArray(p)&&p.length>0){const ld=getListsData();const ed=getEloData();setRestaurants(p.map(r=>({...r,lists:r.lists||ld[String(r.id)]||getAutoLists(r),eloScore:r.eloScore??ed[String(r.id)]?.eloScore??5.0,eloComparisons:r.eloComparisons??ed[String(r.id)]?.eloComparisons??0})));return;}}
          const v3=localStorage.getItem("sabor_v3_restaurants");
          if(v3){const p=JSON.parse(v3);if(Array.isArray(p)&&p.length>0){setRestaurants(p.map(r=>({...r,eloScore:5.0,eloComparisons:0})));return;}}
        }catch{}
        setRestaurants([]);
      }
    };

    // ── init: verificar sesión activa ──
    useEffect(()=>{
      const init=async()=>{
        const{data:{session}}=await sb.auth.getSession();
        if(session?.user){
          setUser(session.user);
          await Promise.all([loadProfile(session.user.id),loadRestaurants(session.user.id)]);
          setOnboardingDone(true);
        } else {
          // sin sesión: intentar datos locales (usuarios que no migraron aún)
          const done=localStorage.getItem("sabor_v4_onboarding");
          if(done){
            setOnboardingDone(true);
            try{const p=localStorage.getItem("sabor_v4_profile");if(p)setProfile(JSON.parse(p));}catch{}
            try{
              const v4=localStorage.getItem("sabor_v4_restaurants");
              if(v4){const p=JSON.parse(v4);if(Array.isArray(p)&&p.length>0){setRestaurants(p);}}
              else{
                const v3=localStorage.getItem("sabor_v3_restaurants");
                if(v3){const p=JSON.parse(v3);if(Array.isArray(p)&&p.length>0)setRestaurants(p.map(r=>({...r,eloScore:5.0,eloComparisons:0})));}
                else setRestaurants(SAMPLE_RESTAURANTS);
              }
            }catch{setRestaurants(SAMPLE_RESTAURANTS);}
          }
        }
        setAppLoading(false);
      };
      init();
      const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
        if(!session) setUser(null);
      });
      return()=>subscription.unsubscribe();
    },[]);

    // ── persistir en localStorage cuando no hay sesión Supabase ──
    useEffect(()=>{
      if(!user&&onboardingDone){
        try{localStorage.setItem("sabor_v4_restaurants",JSON.stringify(restaurants));}
        catch{try{localStorage.setItem("sabor_v4_restaurants",JSON.stringify(restaurants.map(r=>({...r,photo:null}))));}catch{}}
      }
    },[restaurants]);
    // ── persistir ELO para todos los usuarios (también con Supabase) ──
    useEffect(()=>{if(onboardingDone)saveEloData(restaurants);},[restaurants]);

    // ── Comment notification polling ──
    useEffect(()=>{
      if(!user||!onboardingDone)return;
      const checkComments=async()=>{
        try{
          const lastSeen=localStorage.getItem("sabor_lastSeenComments")||new Date(0).toISOString();
          const myRestIds=restaurants.filter(r=>typeof r.id==="string").map(r=>r.id);
          if(!myRestIds.length){setCommentBadge(0);return;}
          const{data,error}=await sb.from("comments").select("id").in("restaurant_id",myRestIds).neq("user_id",user.id).gt("created_at",lastSeen);
          if(!error)setCommentBadge((data||[]).length);
        }catch{}
      };
      checkComments();
      const interval=setInterval(checkComments,30000);
      return()=>clearInterval(interval);
    },[user,onboardingDone,restaurants]);

    const updateRestaurant=(id,updater)=>setRestaurants(prev=>prev.map(r=>r.id===id?updater(r):r));

    const handleEloUpdate=(winnerId,loserId)=>{
      setRestaurants(prev=>{
        const winner=prev.find(r=>r.id===winnerId);
        const loser=prev.find(r=>r.id===loserId);
        if(!winner||!loser)return prev;
        const{winner:ws,loser:ls}=calcElo(winner.eloScore||5.0,loser.eloScore||5.0);
        return prev.map(r=>{
          if(r.id===winnerId)return{...r,eloScore:ws,eloComparisons:(r.eloComparisons||0)+1};
          if(r.id===loserId)return{...r,eloScore:ls,eloComparisons:(r.eloComparisons||0)+1};
          return r;
        });
      });
    };

    // ── CRUD restaurantes ──
    const handleSave=async(r,options={})=>{
      const isNew=modal==="add"||(modal&&modal._mapPrefill===true);
      let newId=null;
      if(user){
        const dbRec={name:r.name,neighborhood:r.neighborhood,cuisine:r.cuisine,rating:r.rating,notes:r.notes||"",emoji:r.emoji,cover_photo:r.photo||null,lat:r.lat||null,lng:r.lng||null,place_id:r.place_id||null,is_public:true,visited_at:r.date||null};
        if(isNew){
          dbRec.user_id=user.id;
          const{data,error}=await sb.from("restaurants").insert(dbRec).select().single();
          if(error){showToast("Error al guardar: "+error.message,"error");setModal(null);return;}
          if(data){
            newId=data.id;
            const newR={...r,id:data.id,photo:data.cover_photo,date:data.visited_at||data.created_at?.split("T")[0],eloScore:5.0,eloComparisons:0,went_with:r.went_with||[]};
            setRestaurants(prev=>[newR,...prev]);
          }
        } else {
          const{error}=await sb.from("restaurants").update(dbRec).eq("id",r.id);
          if(error){showToast("Error al actualizar: "+error.message,"error");return;}
          setRestaurants(prev=>prev.map(x=>x.id===r.id?{...r}:x));
        }
      } else {
        if(isNew){newId=r.id;setRestaurants(prev=>[{...r,eloScore:5.0,eloComparisons:0},...prev]);}
        else setRestaurants(prev=>prev.map(x=>x.id===r.id?{...r}:x));
      }
      if(r.lists)saveListsData(isNew?(newId||r.id):r.id,r.lists);
      setModal(null);
      showToast(isNew?"✓ Hallazgo guardado":"✓ Hallazgo actualizado");
      if(isNew&&(newId||r.id))setEloCompareFor(newId||r.id);
    };

    const handleDelete=async(id)=>{
      if(user){const{error}=await sb.from("restaurants").delete().eq("id",id);if(error){showToast("Error al eliminar","error");return;}}
      setRestaurants(p=>p.filter(r=>r.id!==id));
      showToast("Hallazgo eliminado");
    };

    const handleAddDish=async(rid,dish)=>{
      const target=restaurants.find(r=>r.id===rid);if(!target)return;
      const newDishes=[...(target.dishes||[]),dish];
      if(user){const{error}=await sb.from("restaurants").update({dishes:newDishes}).eq("id",rid);if(error){showToast("Error al guardar plato","error");return;}}
      updateRestaurant(rid,r=>({...r,dishes:newDishes}));
      showToast("✓ Plato guardado");
    };

    const handleDeleteDish=async(rid,did)=>{
      const target=restaurants.find(r=>r.id===rid);if(!target)return;
      const newDishes=(target.dishes||[]).filter(d=>d.id!==did);
      if(user){const{error}=await sb.from("restaurants").update({dishes:newDishes}).eq("id",rid);if(error){showToast("Error al eliminar plato","error");return;}}
      updateRestaurant(rid,r=>({...r,dishes:newDishes}));
    };

    // ── callback del onboarding ──
    const handleOnboardingComplete=async(supabaseUser,profileData)=>{
      if(supabaseUser){
        setUser(supabaseUser);
        if(profileData){
          // signup: insertar perfil nuevo
          await sb.from("profiles").insert({id:supabaseUser.id,name:profileData.name,username:profileData.handle.replace(/^@/,""),bio:profileData.bio||null});
          setProfile(profileData);
        } else {
          // login: cargar perfil existente
          await loadProfile(supabaseUser.id);
        }
        await loadRestaurants(supabaseUser.id);
      } else {
        // fallback sin Supabase
        setProfile(profileData);
        localStorage.setItem("sabor_v4_profile",JSON.stringify(profileData));
        localStorage.setItem("sabor_v4_onboarding","1");
        setRestaurants(SAMPLE_RESTAURANTS);
      }
      setOnboardingDone(true);
    };

    const detailRestaurant=detailId!=null?restaurants.find(r=>r.id===detailId):null;

    if(appLoading)return(
      <div className="phone-outer" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#050505",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:64,marginBottom:12}}>🍽️</div>
          <p style={{fontSize:20,fontWeight:900,color:"#fff",letterSpacing:"-1px",margin:0}}>sabor<span style={{color:"#f97316"}}>.</span></p>
          <p style={{fontSize:12,color:"#444",marginTop:8}}>Cargando tu bitácora…</p>
        </div>
      </div>
    );

    return(
      <div className="phone-outer" style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#050505",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>
        <div className="phone-frame" style={{width:390,height:844,background:"#0f0f0f",borderRadius:48,position:"relative",overflow:"hidden",boxShadow:"0 0 0 1px #333, 0 0 0 3px #111, 0 0 80px rgba(249,115,22,0.08), 0 40px 120px rgba(0,0,0,0.8)",border:"1px solid #2a2a2a"}}>
          {/* Status bar */}
          <div style={{height:48,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 24px",flexShrink:0}}>
            <span style={{fontSize:13,fontWeight:600,color:"#fff"}}>9:41</span>
            <div style={{width:126,height:32,background:"#111",borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:11,height:11,borderRadius:"50%",background:"#1a1a1a"}}/></div>
            <span style={{fontSize:10,color:"#fff"}}>●●● ▲ ⬛</span>
          </div>

          {/* Onboarding */}
          {!onboardingDone?(
            <div style={{position:"absolute",top:48,left:0,right:0,bottom:0,overflow:"hidden"}}>
              <Onboarding onComplete={handleOnboardingComplete}/>
            </div>
          ):(
            <>
              {/* Detail screen (full overlay) */}
              {detailRestaurant&&(
                <div style={{position:"absolute",top:48,left:0,right:0,bottom:0,zIndex:40,background:"#0f0f0f"}}>
                  <DetailScreen
                    restaurant={detailRestaurant}
                    profile={profile}
                    user={user}
                    onBack={()=>setDetailId(null)}
                    onEdit={r=>{setDetailId(null);setTimeout(()=>setModal(r),50);}}
                    onAddDish={handleAddDish}
                    onDeleteDish={handleDeleteDish}
                  />
                </div>
              )}

              {/* Main screens */}
              <div style={{position:"absolute",top:48,left:0,right:0,bottom:72,overflow:"hidden"}}>
                {activeTab==="bitacora"&&<BitacoraScreen restaurants={restaurants} onDelete={handleDelete} onAddOpen={()=>setModal("add")} onEdit={r=>setModal(r)} onOpenDetail={r=>setDetailId(r.id)} allLists={allLists} onCreateList={handleCreateList} onDeleteList={handleDeleteList} onRenameList={handleRenameList}/>}
                {activeTab==="map"&&<MapScreen restaurants={restaurants} onOpenDetail={r=>setDetailId(r.id)} onAddRestaurant={r=>setModal(r)}/>}
                {activeTab==="feed"&&<FeedScreen user={user} myRestaurants={restaurants} onGoToProfile={()=>setActiveTab("profile")} onOpenFriendProfile={id=>setFriendProfileId(id)}/>}
                {activeTab==="profile"&&<ProfileScreen restaurants={restaurants} profile={profile} user={user}/>}
              </div>

              <BottomNav active={activeTab} commentBadge={commentBadge} onChange={t=>{if(t==="profile"&&commentBadge>0){localStorage.setItem("sabor_lastSeenComments",new Date().toISOString());setCommentBadge(0);}setActiveTab(t);setDetailId(null);}}/>
              {modal&&<AddEditModal initial={modal==="add"||(modal&&modal._mapPrefill)?null:modal} prefillData={modal&&modal._mapPrefill?modal:null} onSave={handleSave} onClose={()=>setModal(null)} onDelete={modal!=="add"&&!(modal&&modal._mapPrefill)?()=>{handleDelete(modal.id);setModal(null);}:null} allLists={allLists} user={user}/>}
              {friendProfileId&&user&&<FriendProfileModal friendId={friendProfileId} user={user} myRestaurants={restaurants} onClose={()=>setFriendProfileId(null)}/>}
              <Toast message={toast.message} visible={toast.visible} type={toast.type}/>
              {eloCompareFor&&restaurants.length>=2&&restaurants.find(r=>r.id===eloCompareFor)&&(
                <div style={{position:"absolute",top:48,left:0,right:0,bottom:0,zIndex:150}}>
                  <EloComparisonScreen
                    restaurants={restaurants}
                    newRestaurantId={eloCompareFor}
                    onComplete={()=>{setEloCompareFor(null);setActiveTab("bitacora");}}
                    onUpdateElo={handleEloUpdate}
                  />
                </div>
              )}
            </>
          )}
        </div>
        <PWAInstallBanner/>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Sabor/>);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>
</body>
</html>
